<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria com Texturas</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4da0ff; font-family: sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.3); padding: 8px; border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="info">WASD para mover | Clique para minerar</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Carregamento de Texturas ---
const imgGrama = new Image();
imgGrama.src = "https://st2.depositphotos.com/1796420/8408/v/450/depositphotos_84083416-stock-illustration-texture-for-platformers-pixel-art.jpg";

const imgTerra = new Image();
imgTerra.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRtCbeyZC6PjgiaDttQFYo4r4TUHIJFCdumA&s";

// --- Configurações ---
const TILE_SIZE = 40;
const ROWS = Math.ceil(canvas.height / TILE_SIZE);
const COLS = Math.ceil(canvas.width / TILE_SIZE);
const GRAVITY = 0.5;

let world = [];
for (let y = 0; y < ROWS; y++) {
    world[y] = [];
    for (let x = 0; x < COLS; x++) {
        if (y > 10) world[y][x] = (y === 11) ? 1 : 2; 
        else world[y][x] = 0;
    }
}

const player = {
    x: 100, y: 100, w: 30, h: 50,
    vx: 0, vy: 0, speed: 5, jump: -10, onGround: false
};

const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

canvas.onmousedown = (e) => {
    const gridX = Math.floor(e.clientX / TILE_SIZE);
    const gridY = Math.floor(e.clientY / TILE_SIZE);
    if (world[gridY]) world[gridY][gridX] = 0;
};

function update() {
    if (keys['KeyA']) player.vx = -player.speed;
    else if (keys['KeyD']) player.vx = player.speed;
    else player.vx = 0;

    if (keys['KeyW'] && player.onGround) {
        player.vy = player.jump;
        player.onGround = false;
    }

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    player.onGround = false;
    const pGridX = Math.floor((player.x + player.w/2) / TILE_SIZE);
    const pGridY = Math.floor((player.y + player.h) / TILE_SIZE);

    if (world[pGridY] && world[pGridY][pGridX] !== 0) {
        player.y = pGridY * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    // Fundo (Céu)
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Desenhar Blocos com Imagens
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            const blockType = world[y][x];
            if (blockType === 0) continue;

            const posX = x * TILE_SIZE;
            const posY = y * TILE_SIZE;

            if (blockType === 1) {
                // Desenha a imagem da Grama
                ctx.drawImage(imgGrama, posX, posY, TILE_SIZE, TILE_SIZE);
            } else if (blockType === 2) {
                // Desenha a imagem da Terra
                ctx.drawImage(imgTerra, posX, posY, TILE_SIZE, TILE_SIZE);
                
                // Efeito de sombra opcional para profundidade (deixa blocos mais fundos escuros)
                if (y > 12) {
                    ctx.fillStyle = "rgba(0,0,0,0.2)";
                    ctx.fillRect(posX, posY, TILE_SIZE, TILE_SIZE);
                }
            }
        }
    }

    // Desenhar Jogador
    ctx.fillStyle = '#FF6347';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // Borda do jogador
    ctx.strokeStyle = 'black';
    ctx.strokeRect(player.x, player.y, player.w, player.h);
}

// Inicia o jogo
update();
</script>
</body>
</html>
