<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Limites Corrigidos</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #inventory-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.7); padding: 10px;
            border-radius: 12px; border: 2px solid #444; z-index: 100;
        }
        .slot {
            width: 50px; height: 50px; background: #333;
            border: 2px solid #666; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; background: #555; }
        .slot canvas { width: 32px; height: 32px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="info">
    <b>A, D:</b> Mover | <b>W:</b> Pular | <b>LIMITES:</b> 0 a 6000px<br>
    <b>Dia/Noite:</b> Ativado | <b>1-5:</b> Itens
</div>

<div id="inventory-ui">
    <div class="slot selected" id="slot-1"><div class="count">0</div></div>
    <div class="slot" id="slot-2"><div class="count">0</div></div>
    <div class="slot" id="slot-3"><div class="count">0</div></div>
    <div class="slot" id="slot-4"><div class="count">0</div></div>
    <div class="slot" id="slot-5"><div class="count">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 40;
const WORLD_COLS = 150; // Largura do mundo (6000 pixels)
const WORLD_ROWS = 60;
const REACH_DISTANCE = TILE_SIZE * 5;
const DURABILITY = { 1: 15, 2: 15, 3: 40, 4: 25, 5: 10 };

let gameTime = 1200;
const DAY_LENGTH = 5000;

// --- TEXTURAS ---
const tex = {};
function initTextures() {
    const colors = {
        1: ["#4caf50", "#2e7d32", "grass"],
        2: ["#795548", "#5d4037", "block"],
        3: ["#9e9e9e", "#616161", "block"],
        4: ["#5d4037", "#3e2723", "block"],
        5: ["#2e7d32", "#1b5e20", "leaves"]
    };
    for (let id in colors) {
        const tCanvas = document.createElement('canvas');
        tCanvas.width = 16; tCanvas.height = 16;
        const tCtx = tCanvas.getContext('2d');
        tCtx.fillStyle = colors[id][0];
        tCtx.fillRect(0, 0, 16, 16);
        tCtx.fillStyle = colors[id][1];
        if(colors[id][2] === "grass") tCtx.fillRect(0, 0, 16, 5);
        if(colors[id][2] === "block") { tCtx.globalAlpha = 0.3; tCtx.fillRect(0, 13, 16, 3); tCtx.fillRect(13, 0, 3, 16); }
        tex[id] = tCanvas;
    }
}

// --- MUNDO ---
let world = [], worldDamage = [];
function initWorld() {
    for (let y = 0; y < WORLD_ROWS; y++) {
        world[y] = []; worldDamage[y] = [];
        for (let x = 0; x < WORLD_COLS; x++) {
            let surfaceY = Math.floor(25 + Math.sin(x * 0.15) * 3);
            let type = (y === surfaceY) ? 1 : (y > surfaceY && y < surfaceY + 10) ? 2 : (y >= surfaceY + 10) ? 3 : 0;
            world[y][x] = type;
            worldDamage[y][x] = type !== 0 ? DURABILITY[type] : 0;
        }
    }
}

// --- JOGADOR ---
const player = { 
    x: (WORLD_COLS * TILE_SIZE) / 2, y: 0, 
    w: 22, h: 36, 
    vx: 0, vy: 0, 
    speed: 5, jump: -11, 
    onGround: false 
};

let inventory = { 1: 10, 2: 10, 3: 0, 4: 0, 5: 0 };
let selectedSlot = 1;
const keys = {};
const camera = { x: 0, y: 0 };
let mousePos = { x: 0, y: 0 }, isMouseDown = false, isRightMouseDown = false;

// --- LÓGICA DE COLISÃO COM TRAVA DE MAPA ---
function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE);
    const gy = Math.floor(py / TILE_SIZE);
    
    // Se sair das bordas laterais ou do topo, não é sólido (vácuo)
    if (gx < 0 || gx >= WORLD_COLS || gy < 0) return false;
    // Se cair no fundo do mundo, é sólido (morte/barreira)
    if (gy >= WORLD_ROWS) return true;

    return world[gy][gx] !== 0;
}

window.onkeydown = (e) => { keys[e.code] = true; if (e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateUI(); } };
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if (e.button === 0) isMouseDown = true; if (e.button === 2) isRightMouseDown = true; };
window.onmouseup = (e) => { isMouseDown = false; isRightMouseDown = false; };
canvas.onmousemove = (e) => { mousePos.x = e.clientX + camera.x; mousePos.y = e.clientY + camera.y; };
canvas.oncontextmenu = (e) => e.preventDefault();

function update() {
    gameTime = (gameTime + 1) % DAY_LENGTH;

    // 1. MOVIMENTO X
    player.vx = keys['KeyA'] ? -player.speed : keys['KeyD'] ? player.speed : 0;
    player.x += player.vx;

    // Trava de borda do mapa (X)
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > WORLD_COLS * TILE_SIZE) player.x = WORLD_COLS * TILE_SIZE - player.w;

    // Colisão X
    if (isSolid(player.x, player.y + 4) || isSolid(player.x + player.w, player.y + 4) ||
        isSolid(player.x, player.y + player.h - 4) || isSolid(player.x + player.w, player.y + player.h - 4)) {
        if (player.vx > 0) player.x = Math.floor((player.x + player.w) / TILE_SIZE) * TILE_SIZE - player.w - 0.1;
        else if (player.vx < 0) player.x = Math.floor(player.x / TILE_SIZE) * TILE_SIZE + TILE_SIZE + 0.1;
    }

    // 2. MOVIMENTO Y
    player.vy += 0.6;
    player.y += player.vy;
    player.onGround = false;

    // Colisão Y
    if (isSolid(player.x + 2, player.y + player.h) || isSolid(player.x + player.w - 2, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }
    if (player.onGround && (keys['Space'] || keys['KeyW'])) player.vy = player.jump;

    // 3. MINERAÇÃO/CONSTRUÇÃO
    const gx = Math.floor(mousePos.x / TILE_SIZE);
    const gy = Math.floor(mousePos.y / TILE_SIZE);
    const dist = Math.hypot(mousePos.x - (player.x + player.w/2), mousePos.y - (player.y + player.h/2));

    if (dist <= REACH_DISTANCE && gy >= 0 && gy < WORLD_ROWS && gx >= 0 && gx < WORLD_COLS) {
        if (isMouseDown && world[gy][gx] !== 0) {
            worldDamage[gy][gx]--;
            if(worldDamage[gy][gx] <= 0) {
                inventory[world[gy][gx]] = (inventory[world[gy][gx]] || 0) + 1;
                world[gy][gx] = 0;
                updateUI();
            }
        }
        if (isRightMouseDown && world[gy][gx] === 0 && inventory[selectedSlot] > 0) {
            const pGx = Math.floor((player.x + player.w/2) / TILE_SIZE);
            const pGy = Math.floor((player.y + player.h/2) / TILE_SIZE);
            if(gx !== pGx || gy !== pGy) {
                world[gy][gx] = selectedSlot;
                worldDamage[gy][gx] = DURABILITY[selectedSlot];
                inventory[selectedSlot]--;
                updateUI();
            }
        }
    }

    // CAMERA
    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;
    // Trava a camera para não mostrar o "vazio" fora do mapa
    camera.x = Math.max(0, Math.min(camera.x, WORLD_COLS * TILE_SIZE - canvas.width));

    draw();
    requestAnimationFrame(update);
}

function draw() {
    let dayRatio = Math.sin((gameTime / DAY_LENGTH) * Math.PI * 2); 
    ctx.fillStyle = `rgb(0, ${Math.max(10, 60 + dayRatio * 100)}, ${Math.max(20, 100 + dayRatio * 155)})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sC = Math.floor(camera.x / TILE_SIZE) - 1, eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 2;
    const sR = Math.floor(camera.y / TILE_SIZE) - 1, eR = sR + Math.ceil(canvas.height / TILE_SIZE) + 2;

    for (let y = sR; y < eR; y++) {
        if (y < 0 || y >= WORLD_ROWS) continue;
        for (let x = sC; x < eC; x++) {
            if (x < 0 || x >= WORLD_COLS) continue;
            if (world[y][x] !== 0) {
                ctx.drawImage(tex[world[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                if(worldDamage[y][x] < DURABILITY[world[y][x]]) {
                    ctx.fillStyle = "rgba(0,0,0,0.4)";
                    let pct = 1 - (worldDamage[y][x] / DURABILITY[world[y][x]]);
                    ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE + (TILE_SIZE*(1-pct)), TILE_SIZE, TILE_SIZE*pct);
                }
            } else if (y > 28) {
                ctx.fillStyle = "rgba(0,0,0,0.15)";
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    ctx.fillStyle = "#ff5722";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.restore();

    let nightOpacity = Math.max(0, -dayRatio * 0.6);
    ctx.fillStyle = `rgba(0, 0, 30, ${nightOpacity})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function updateUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.querySelector('.count').innerText = inventory[i] || 0;
        slot.classList.toggle('selected', selectedSlot === i);
        if (!slot.querySelector('canvas') && tex[i]) {
            const icon = document.createElement('canvas');
            icon.width = 16; icon.height = 16;
            icon.getContext('2d').drawImage(tex[i], 0, 0);
            slot.appendChild(icon);
        }
    }
}

initTextures();
initWorld();
updateUI();
update();
</script>
</body>
</html>
