<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria Melhorado</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4da0ff; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 20px; left: 20px; 
            color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
            pointer-events: none; background: rgba(0,0,0,0.3);
            padding: 10px; border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="info">WASD: Mover | Clique: Minerar</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 40;
const ROWS = Math.ceil(canvas.height / TILE_SIZE);
const COLS = Math.ceil(canvas.width / TILE_SIZE);
const GRAVITY = 0.5;

// Cores Estilizadas
const COLORS = {
    skyTop: '#4da0ff',
    skyBottom: '#94c8ff',
    grass: '#3ea331',
    grassDark: '#2d7a24',
    dirt: '#855e42',
    dirtDark: '#5d4037',
    player: '#e74c3c'
};

let world = [];
for (let y = 0; y < ROWS; y++) {
    world[y] = [];
    for (let x = 0; x < COLS; x++) {
        if (y > 10) world[y][x] = (y === 11) ? 1 : 2; 
        else world[y][x] = 0;
    }
}

const player = {
    x: 100, y: 100, w: 26, h: 44,
    vx: 0, vy: 0, speed: 5, jump: -10, onGround: false
};

const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

canvas.onmousedown = (e) => {
    const gridX = Math.floor(e.clientX / TILE_SIZE);
    const gridY = Math.floor(e.clientY / TILE_SIZE);
    if (world[gridY]) world[gridY][gridX] = 0;
};

// Função para desenhar detalhes de textura (ruído)
function drawTileTexture(x, y, color1, color2) {
    ctx.fillStyle = color1;
    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
    
    // Pequenos detalhes/pontos para textura
    ctx.fillStyle = color2;
    for(let i=0; i<4; i++) {
        let px = (i * 7) % TILE_SIZE;
        let py = (i * 11) % TILE_SIZE;
        ctx.fillRect(x + px, y + py, 4, 4);
    }
}

function update() {
    if (keys['KeyA']) player.vx = -player.speed;
    else if (keys['KeyD']) player.vx = player.speed;
    else player.vx = 0;

    if (keys['KeyW'] && player.onGround) {
        player.vy = player.jump;
        player.onGround = false;
    }

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    player.onGround = false;
    const pGridX = Math.floor((player.x + player.w/2) / TILE_SIZE);
    const pGridY = Math.floor((player.y + player.h) / TILE_SIZE);

    if (world[pGridY] && world[pGridY][pGridX] !== 0) {
        player.y = pGridY * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    // 1. Fundo com Gradiente
    let sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
    sky.addColorStop(0, COLORS.skyTop);
    sky.addColorStop(0.6, COLORS.skyBottom);
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 2. Desenhar Blocos
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            const tx = x * TILE_SIZE;
            const ty = y * TILE_SIZE;

            if (world[y][x] === 1) { // Grama
                drawTileTexture(tx, ty, COLORS.grass, COLORS.grassDark);
                // "Franja" de grama no topo
                ctx.fillStyle = '#55cc44';
                ctx.fillRect(tx, ty, TILE_SIZE, 5);
            } 
            else if (world[y][x] === 2) { // Terra
                drawTileTexture(tx, ty, COLORS.dirt, COLORS.dirtDark);
                // Sombra interna para profundidade
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
            }

            // Grade suave
            if (world[y][x] !== 0) {
                ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                ctx.strokeRect(tx, ty, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // 3. Desenhar Jogador (com "olhos" e sombra)
    // Sombra do jogador
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(player.x + 4, player.y + 4, player.w, player.h);
    
    // Corpo
    ctx.fillStyle = COLORS.player;
    ctx.fillRect(player.x, player.y, player.w, player.h);
    
    // Olhos (olhando para a direção do movimento)
    ctx.fillStyle = 'white';
    let eyeOffset = player.vx >= 0 ? 15 : 5;
    ctx.fillRect(player.x + eyeOffset, player.y + 10, 6, 6);
}

update();
</script>
</body>
</html>
