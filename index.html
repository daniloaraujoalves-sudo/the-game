<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Terraria JS - World Explorer Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; image-rendering: pixelated; cursor: crosshair; }
        
        /* UI Principal */
        .ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        #hp-bar { width: 200px; height: 18px; background: #1a1a1a; border: 2px solid #333; margin-bottom: 10px; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #d32f2f, #ff5252); }
        
        /* Mini-mapa Style */
        #minimap-container { 
            position: absolute; top: 20px; right: 20px; 
            width: 180px; height: 120px; 
            border: 4px solid #3d3d3d; background: rgba(0,0,0,0.8);
            overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #minimapCanvas { width: 100%; height: 100%; image-rendering: pixelated; }

        /* Hotbar */
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; pointer-events: all; padding: 10px; background: rgba(0,0,0,0.6); border: 2px solid #444; }
        .slot { width: 44px; height: 44px; background: rgba(40,40,80,0.7); border: 2px solid #222; display: flex; align-items: center; justify-content: center; position: relative; }
        .slot.selected { border-color: #fbff00; background: rgba(70,70,140,0.8); }
        .count { position: absolute; bottom: 1px; right: 3px; color: white; font-size: 11px; text-shadow: 1px 1px black; }
    </style>
</head>
<body>

<div class="ui">
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div style="color: white; text-shadow: 1px 1px 2px #000;">Bioma: Floresta Profunda</div>
</div>

<div id="minimap-container">
    <canvas id="minimapCanvas"></canvas>
</div>

<div id="hotbar"></div>
<canvas id="gameCanvas"></canvas>

<script>
/** ENGINE CONFIG - MUNDO AUMENTADO **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimapCanvas');
const mCtx = mCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 32;
const WORLD_W = 1200; // Mundo massivo (38.400 pixels de largura)
const WORLD_H = 250;  // Profundidade aumentada para cavernas épicas
const SEED = Math.random() * 99999;

let world = [], walls = [], light = [];
let drops = [], entities = [];
const tex = {};
const player = { x: (WORLD_W * TILE_SIZE) / 2, y: 1000, w: 20, h: 34, vx: 0, vy: 0, hp: 100, selected: 1, inv: {1:99, 2:99, 3:99, 4:0, 8:0} };
const camera = { x: 0, y: 0 };
const keys = {};
let mouse = { x: 0, y: 0, down: false, right: false };

/** GERAÇÃO DE TERRENO **/
function initWorld() {
    for (let y = 0; y < WORLD_H; y++) {
        world[y] = new Int8Array(WORLD_W);
        walls[y] = new Int8Array(WORLD_W);
        light[y] = new Float32Array(WORLD_W);
    }

    for (let x = 0; x < WORLD_W; x++) {
        let surf = 60 + Math.floor(Math.sin(x * 0.05) * 10 + Math.sin(x * 0.01) * 20);
        for (let y = 0; y < WORLD_H; y++) {
            if (y >= surf) {
                // Algoritmo de Densidade para Cavernas (Perlin-like)
                let density = Math.sin(x * 0.12) + Math.sin(y * 0.15) + (Math.random() * 1.8);
                if (density < 2.3) { 
                    world[y][x] = (y < surf + 25) ? 2 : 3;
                    if (y === surf) world[y][x] = 1;
                    if (y > 100 && Math.random() < 0.015) world[y][x] = 8;
                }
                walls[y][x] = (y < surf + 25) ? 2 : 3;
            }
        }
        // Árvores esparsas
        if (x % 18 === 0 && Math.random() > 0.4) {
            let th = 6 + Math.floor(Math.random() * 5);
            for(let i=1; i<th; i++) if(surf-i > 0) world[surf-i][x] = 4;
            for(let ly=-2; ly<=0; ly++) for(let lx=-1; lx<=1; lx++) 
                if(surf-th+ly > 0) world[surf-th+ly][x+lx] = 5;
        }
    }
    mCanvas.width = WORLD_W;
    mCanvas.height = WORLD_H;
}

/** ILUMINAÇÃO **/
function updateLighting() {
    for (let x = 0; x < WORLD_W; x++) {
        let sky = 1.0;
        for (let y = 0; y < WORLD_H; y++) {
            if (world[y][x] !== 0 && world[y][x] !== 5) sky -= 0.18;
            if (sky < 0.1) sky = 0.1;
            light[y][x] = sky;
        }
    }
}

/** MINI-MAPA **/
function drawMinimap() {
    mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
    const colors = { 1: "#52ad56", 2: "#855428", 3: "#444", 4: "#634121", 5: "#2ecc71", 8: "#fff" };
    
    // Renderiza apenas uma versão simplificada no canvas oculto do mapa
    for (let y = 0; y < WORLD_H; y += 2) { // Step 2 para performance
        for (let x = 0; x < WORLD_W; x += 2) {
            let id = world[y][x];
            if (id !== 0) {
                mCtx.fillStyle = colors[id];
                mCtx.fillRect(x, y, 2, 2);
            }
        }
    }
    // Player no mapa
    mCtx.fillStyle = "red";
    mCtx.fillRect(player.x / TILE_SIZE, player.y / TILE_SIZE, 6, 6);
}

/** TEXTURAS PIXEL ART **/
function initTextures() {
    const p = { 1: "#48b04d", 2: "#8b5a2b", 3: "#7a7a7a", 4: "#6b4423", 5: "#2ecc71", 8: "#d1d1d1" };
    for (let id in p) {
        let t = document.createElement('canvas'); t.width = 16; t.height = 16;
        let c = t.getContext('2d');
        c.fillStyle = p[id]; c.fillRect(0,0,16,16);
        c.fillStyle = "rgba(0,0,0,0.15)"; c.fillRect(0,0,16,4);
        tex[id] = t;
    }
}

/** LOOP DE ATUALIZAÇÃO **/
function update() {
    // Física
    player.vx = keys['KeyA'] ? -5.5 : keys['KeyD'] ? 5.5 : 0;
    player.vy += 0.45;
    player.x += player.vx;
    if(checkColl(player.x, player.y)) player.x -= player.vx;
    player.y += player.vy;
    if(checkColl(player.x, player.y)) {
        player.y = Math.floor((player.y + player.h)/TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0;
        if(keys['Space'] || keys['KeyW']) player.vy = -10.5;
    }

    // Mineração e Construção
    let mx = mouse.x + camera.x, my = mouse.y + camera.y;
    let gx = Math.floor(mx/TILE_SIZE), gy = Math.floor(my/TILE_SIZE);
    let dist = Math.hypot(mx - (player.x+10), my - (player.y+17));

    if (mouse.down && world[gy] && world[gy][gx] !== 0 && dist < 220) {
        world[gy][gx] = 0;
        updateLighting();
        if(Math.random() < 0.1) drawMinimap(); // Atualiza mapa ocasionalmente ao minerar
    }
    if (mouse.right && world[gy] && world[gy][gx] === 0 && dist < 220 && player.inv[player.selected] > 0) {
        world[gy][gx] = player.selected;
        player.inv[player.selected]--;
        updateLighting();
        updateUI();
        drawMinimap();
    }

    // Câmera Suave
    camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

    draw();
    requestAnimationFrame(update);
}

function checkColl(x, y) {
    let gx = Math.floor((x+4)/TILE_SIZE), gy = Math.floor((y+player.h)/TILE_SIZE);
    let gx2 = Math.floor((x+player.w-4)/TILE_SIZE);
    return world[gy] && (world[gy][gx] !== 0 && world[gy][gx] !== 5 || world[gy][gx2] !== 0 && world[gy][gx2] !== 5);
}

function draw() {
    // Céu Dinâmico
    ctx.fillStyle = "#5d94fb";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    let x0 = Math.floor(camera.x/TILE_SIZE)-1, x1 = x0 + Math.ceil(canvas.width/TILE_SIZE)+2;
    let y0 = Math.floor(camera.y/TILE_SIZE)-1, y1 = y0 + Math.ceil(canvas.height/TILE_SIZE)+2;

    for(let y=Math.max(0, y0); y<Math.min(WORLD_H, y1); y++) {
        for(let x=Math.max(0, x0); x<Math.min(WORLD_W, x1); x++) {
            // Walls
            if (walls[y][x] !== 0) {
                ctx.fillStyle = walls[y][x] === 2 ? "#3d2b1f" : "#252525";
                ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
            // Blocks
            let id = world[y][x];
            if(id !== 0) ctx.drawImage(tex[id], x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            
            // Iluminação
            ctx.fillStyle = `rgba(0,0,0,${1 - light[y][x]})`;
            ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    }

    // Player
    ctx.fillStyle = "#e67e22";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.restore();
    
    // UI
    document.getElementById('hp-fill').style.width = player.hp + "%";
}

function updateUI() {
    const hb = document.getElementById('hotbar'); hb.innerHTML = '';
    [1,2,3,8].forEach(id => {
        const s = document.createElement('div');
        s.className = `slot ${player.selected === id ? 'selected' : ''}`;
        s.onclick = () => { player.selected = id; updateUI(); };
        s.innerHTML = `<div class="count">${player.inv[id]||0}</div>`;
        let icon = document.createElement('canvas'); icon.width=16; icon.height=16;
        icon.getContext('2d').drawImage(tex[id],0,0);
        s.appendChild(icon);
        hb.appendChild(s);
    });
}

/** INPUTS **/
window.onkeydown = (e) => { keys[e.code] = true; if(e.key >= 1 && e.key <= 4) { player.selected = [1,2,3,8][e.key-1]; updateUI(); } };
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if(e.button===0) mouse.down = true; if(e.button===2) mouse.right = true; };
window.onmouseup = () => { mouse.down = false; mouse.right = false; };
canvas.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
canvas.oncontextmenu = (e) => e.preventDefault();

initTextures();
initWorld();
updateLighting();
updateUI();
drawMinimap();
update();
</script>
</body>
</html>
