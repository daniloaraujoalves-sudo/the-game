<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Biomas & Minimapa</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }

        /* ESTILO DO MINIMAPA */
        #minimap-container {
            position: absolute; top: 10px; right: 10px;
            width: 220px; height: 130px;
            border: 3px solid #444; background: rgba(0, 0, 0, 0.8);
            border-radius: 6px; overflow: hidden; z-index: 100;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #minimapCanvas {
            width: 100%; height: 100%;
            image-rendering: pixelated;
        }

        #inventory-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.7); padding: 10px;
            border-radius: 12px; border: 2px solid #444; z-index: 100;
        }
        .slot {
            width: 45px; height: 45px; background: #333;
            border: 2px solid #666; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; background: #555; }
        .slot canvas { width: 30px; height: 30px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="info" id="ui-info">
    <b>A, D:</b> Mover | <b>W:</b> Pular | <b>1-5:</b> Itens<br>
    <b>Click Esq:</b> Minerar | <b>Click Dir:</b> Construir
</div>

<div id="minimap-container">
    <canvas id="minimapCanvas"></canvas>
</div>

<div id="inventory-ui">
    <div class="slot selected" id="slot-1"><div class="count">0</div></div>
    <div class="slot" id="slot-2"><div class="count">0</div></div>
    <div class="slot" id="slot-3"><div class="count">0</div></div>
    <div class="slot" id="slot-4"><div class="count">0</div></div>
    <div class="slot" id="slot-5"><div class="count">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimapCanvas');
const mCtx = mCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIGURAÇÃO ---
const TILE_SIZE = 40;
const WORLD_WIDTH_PX = 600000;
const WORLD_COLS = Math.floor(WORLD_WIDTH_PX / TILE_SIZE);
const WORLD_ROWS = 100;
const REACH = TILE_SIZE * 5;

// Blocos: 1:Grama, 2:Terra, 3:Pedra, 4:Madeira, 5:Folha, 6:Areia, 7:Água
const DURABILITY = { 1: 15, 2: 15, 3: 40, 4: 25, 5: 10, 6: 12, 7: 999 };
const COLORS = { 1: "#4caf50", 2: "#795548", 3: "#9e9e9e", 4: "#5d4037", 5: "#2e7d32", 6: "#f4d03f", 7: "#3498db" };

let world = [], worldDamage = [], treeWorld = [];
const player = { x: 5000, y: 0, w: 20, h: 36, vx: 0, vy: 0, speed: 6, jump: -12, onGround: false };
let inventory = { 1: 99, 2: 99, 3: 0, 4: 0, 6: 0 };
let selectedSlot = 1;
const keys = {};
const camera = { x: 0, y: 0 };
let mouse = { x: 0, y: 0, downL: false, downR: false };

// --- TEXTURAS ---
const tex = {};
function initTextures() {
    for (let id in COLORS) {
        const c = document.createElement('canvas');
        c.width = 16; c.height = 16;
        const x = c.getContext('2d');
        x.fillStyle = COLORS[id];
        x.fillRect(0, 0, 16, 16);
        x.strokeStyle = "rgba(0,0,0,0.1)";
        x.strokeRect(0, 0, 16, 16);
        tex[id] = c;
    }
}

// --- GERAÇÃO DE BIOMAS ---
function getBiome(x) {
    if (x < 1200 || x > WORLD_COLS - 1200) return "OCEANO";
    let noise = Math.sin(x * 0.02);
    if (noise > 0.6) return "AMAZONIA";
    if (noise < -0.6) return "DESERTO";
    return "FLORESTA";
}

function initWorld() {
    mCanvas.width = WORLD_COLS;
    mCanvas.height = WORLD_ROWS;

    for (let y = 0; y < WORLD_ROWS; y++) {
        world[y] = new Int8Array(WORLD_COLS);
        worldDamage[y] = new Int16Array(WORLD_COLS);
        treeWorld[y] = new Int8Array(WORLD_COLS);
    }

    for (let x = 0; x < WORLD_COLS; x++) {
        let biome = getBiome(x);
        let surfaceY;

        // Definindo relevo por bioma
        if (biome === "OCEANO") surfaceY = 65;
        else if (biome === "AMAZONIA") surfaceY = Math.floor(35 + Math.sin(x * 0.1) * 8);
        else if (biome === "DESERTO") surfaceY = Math.floor(45 + Math.sin(x * 0.05) * 3);
        else surfaceY = Math.floor(40 + Math.sin(x * 0.08) * 5);

        for (let y = 0; y < WORLD_ROWS; y++) {
            if (y < surfaceY) {
                if (biome === "OCEANO" && y > 50) world[y][x] = 7; // Água
                continue;
            }
            
            let type = 3; // Pedra padrão
            if (y === surfaceY) type = (biome === "DESERTO" || biome === "OCEANO") ? 6 : 1;
            else if (y < surfaceY + 12) type = (biome === "DESERTO") ? 6 : 2;
            
            world[y][x] = type;
            worldDamage[y][x] = DURABILITY[type];
        }

        // Árvores
        if ((biome === "FLORESTA" || biome === "AMAZONIA") && x % 10 === 0 && Math.random() > 0.3) {
            let h = biome === "AMAZONIA" ? 10 : 5;
            for(let i=1; i<=h; i++) if(world[surfaceY-i]) treeWorld[surfaceY-i][x] = 4;
        }
    }
    drawFullMinimap();
}

// --- FUNÇÕES DE MAPA ---
function drawFullMinimap() {
    mCtx.clearRect(0,0, mCanvas.width, mCanvas.height);
    for(let x=0; x<WORLD_COLS; x++) {
        for(let y=0; y<WORLD_ROWS; y++) {
            if(world[y][x] !== 0) {
                mCtx.fillStyle = COLORS[world[y][x]];
                mCtx.fillRect(x, y, 1, 1);
            }
        }
    }
}

function updateMinimapPixel(x, y) {
    if (world[y][x] === 0) mCtx.clearRect(x, y, 1, 1);
    else {
        mCtx.fillStyle = COLORS[world[y][x]];
        mCtx.fillRect(x, y, 1, 1);
    }
}

// --- COLISÃO ---
function isSolid(px, py) {
    let gx = Math.floor(px / TILE_SIZE), gy = Math.floor(py / TILE_SIZE);
    if (gy < 0 || gy >= WORLD_ROWS || gx < 0 || gx >= WORLD_COLS) return false;
    return world[gy][gx] !== 0 && world[gy][gx] !== 7;
}

// --- LOOP ---
function update() {
    // Movimento
    player.vx = (keys['KeyD'] ? player.speed : 0) - (keys['KeyA'] ? player.speed : 0);
    player.x += player.vx;
    if (isSolid(player.x, player.y + 5) || isSolid(player.x + player.w, player.y + 5) || 
        isSolid(player.x, player.y + player.h - 5) || isSolid(player.x + player.w, player.y + player.h - 5)) {
        player.x -= player.vx;
    }

    player.vy += 0.6;
    player.y += player.vy;
    player.onGround = false;
    if (isSolid(player.x + 2, player.y + player.h) || isSolid(player.x + player.w - 2, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0; player.onGround = true;
    }
    if (player.onGround && (keys['Space'] || keys['KeyW'])) player.vy = player.jump;

    // Câmera
    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

    // Interação
    let mx = Math.floor((mouse.x + camera.x) / TILE_SIZE);
    let my = Math.floor((mouse.y + camera.y) / TILE_SIZE);
    let dist = Math.hypot((mouse.x + camera.x) - (player.x + player.w/2), (mouse.y + camera.y) - (player.y + player.h/2));

    if (dist < REACH && world[my]) {
        if (mouse.downL && world[my][mx] !== 0 && world[my][mx] !== 7) {
            worldDamage[my][mx]--;
            if (worldDamage[my][mx] <= 0) {
                inventory[world[my][mx]]++;
                world[my][mx] = 0;
                updateUI();
                updateMinimapPixel(mx, my);
            }
        }
        if (mouse.downR && world[my][mx] === 0 && inventory[selectedSlot] > 0) {
            let pGX = Math.floor(player.x/TILE_SIZE), pGY = Math.floor(player.y/TILE_SIZE);
            if (!(mx === pGX && my === pGY)) {
                world[my][mx] = selectedSlot;
                worldDamage[my][mx] = DURABILITY[selectedSlot];
                inventory[selectedSlot]--;
                updateUI();
                updateMinimapPixel(mx, my);
            }
        }
    }

    // Scroll Minimapa
    mCanvas.style.transform = `translateX(${110 - (player.x / TILE_SIZE)}px)`;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    let pGX = Math.floor(player.x / TILE_SIZE);
    let biome = getBiome(pGX);
    
    // Fundo por bioma
    if(biome === "DESERTO") ctx.fillStyle = "#ffeaa7";
    else if(biome === "AMAZONIA") ctx.fillStyle = "#55efc4";
    else if(biome === "OCEANO") ctx.fillStyle = "#74b9ff";
    else ctx.fillStyle = "#81ecec";
    
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    let sC = Math.floor(camera.x / TILE_SIZE) - 1, eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 2;
    let sR = Math.floor(camera.y / TILE_SIZE) - 1, eR = sR + Math.ceil(canvas.height / TILE_SIZE) + 2;

    for (let y = sR; y < eR; y++) {
        if (!world[y]) continue;
        for (let x = sC; x < eC; x++) {
            if (treeWorld[y][x] !== 0) ctx.drawImage(tex[treeWorld[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            if (world[y][x] !== 0) ctx.drawImage(tex[world[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    }

    ctx.fillStyle = "#ff5722";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.restore();
}

// --- EVENTOS ---
window.onkeydown = (e) => { keys[e.code] = true; if(e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateUI(); }};
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if(e.button === 0) mouse.downL = true; if(e.button === 2) mouse.downR = true; };
window.onmouseup = () => { mouse.downL = false; mouse.downR = false; };
canvas.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
canvas.oncontextmenu = (e) => e.preventDefault();

function updateUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.querySelector('.count').innerText = inventory[i] || 0;
        slot.classList.toggle('selected', selectedSlot === i);
        if (!slot.querySelector('canvas') && tex[i]) {
            const icon = document.createElement('canvas'); icon.width = 16; icon.height = 16;
            icon.getContext('2d').drawImage(tex[i], 0, 0); slot.appendChild(icon);
        }
    }
}

initTextures(); initWorld(); updateUI(); update();
</script>
</body>
</html>
