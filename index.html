<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Sistema de Durabilidade</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4da0ff; font-family: sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="info">
    <b>WASD:</b> Mover | <b>Clique/Segure:</b> Minerar<br>
    <i>Pedra (20 cliques) demora mais que Terra (5 cliques)</i>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Configurações de Blocos ---
const TILE_SIZE = 40;
const DURABILITY = {
    1: 5,  // Grama
    2: 5,  // Terra
    3: 20  // Pedra
};

// --- Carregamento de Texturas ---
let assetsLoaded = 0;
const totalAssets = 3;
function onAssetLoad() { if (++assetsLoaded === totalAssets) update(); }

const imgGrama = new Image(); imgGrama.onload = onAssetLoad;
imgGrama.src = "https://st2.depositphotos.com/1796420/8408/v/450/depositphotos_84083416-stock-illustration-texture-for-platformers-pixel-art.jpg";

const imgTerra = new Image(); imgTerra.onload = onAssetLoad;
imgTerra.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRtCbeyZC6PjgiaDttQFYo4r4TUHIJFCdumA&s";

const imgPedra = new Image(); imgPedra.onload = onAssetLoad;
imgPedra.src = "https://i.pinimg.com/236x/d3/5c/0c/d35c0c58fff90987e9532e808ded0008.jpg";

// --- Mundo e Dano ---
let world = [];
let worldDamage = []; // Armazena o HP atual de cada bloco

const ROWS = Math.ceil(canvas.height / TILE_SIZE);
const COLS = Math.ceil(canvas.width / TILE_SIZE);

for (let y = 0; y < ROWS; y++) {
    world[y] = [];
    worldDamage[y] = [];
    for (let x = 0; x < COLS; x++) {
        let type = 0;
        if (y === 11) type = 1;
        else if (y > 11 && y < 16) type = (y === 15 && Math.random() > 0.5) ? 3 : 2;
        else if (y >= 16) type = 3;
        
        world[y][x] = type;
        worldDamage[y][x] = type !== 0 ? DURABILITY[type] : 0;
    }
}

// --- Jogador ---
const player = { x: 100, y: 100, w: 26, h: 44, vx: 0, vy: 0, speed: 5, jump: -10, onGround: false };
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

// --- Lógica de Mineração ---
let isMouseDown = false;
let mousePos = { x: 0, y: 0 };

canvas.onmousedown = (e) => { isMouseDown = true; mousePos = { x: e.clientX, y: e.clientY }; };
window.onmouseup = () => { isMouseDown = false; };
canvas.onmousemove = (e) => { mousePos = { x: e.clientX, y: e.clientY }; };

function handleMining() {
    if (!isMouseDown) return;

    const gridX = Math.floor(mousePos.x / TILE_SIZE);
    const gridY = Math.floor(mousePos.y / TILE_SIZE);

    if (world[gridY] && world[gridY][gridX] !== 0) {
        worldDamage[gridY][gridX] -= 1; // Tira 1 de durabilidade por frame

        if (worldDamage[gridY][gridX] <= 0) {
            world[gridY][gridX] = 0;
        }
    }
}

function update() {
    // Controles e Física
    if (keys['KeyA']) player.vx = -player.speed;
    else if (keys['KeyD']) player.vx = player.speed;
    else player.vx = 0;

    if (keys['KeyW'] && player.onGround) { player.vy = player.jump; player.onGround = false; }

    player.vy += 0.5; // Gravidade
    player.x += player.vx;
    player.y += player.vy;

    // Colisão simples
    player.onGround = false;
    const pGridX = Math.floor((player.x + player.w/2) / TILE_SIZE);
    const pGridY = Math.floor((player.y + player.h) / TILE_SIZE);
    if (world[pGridY] && world[pGridY][pGridX] !== 0) {
        player.y = pGridY * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }

    handleMining();
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            const type = world[y][x];
            if (type === 0) continue;

            const px = x * TILE_SIZE;
            const py = y * TILE_SIZE;
            let img = type === 1 ? imgGrama : (type === 2 ? imgTerra : imgPedra);
            
            ctx.drawImage(img, px, py, TILE_SIZE, TILE_SIZE);

            // Efeito de rachadura/dano (escurece o bloco conforme perde vida)
            const maxHP = DURABILITY[type];
            const currentHP = worldDamage[y][x];
            if (currentHP < maxHP) {
                const damagePercent = 1 - (currentHP / maxHP);
                ctx.fillStyle = `rgba(0, 0, 0, ${damagePercent * 0.7})`;
                ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            }

            // Iluminação de profundidade para pedra
            if (type === 3) {
                const darkness = Math.min(0.5, (y - 15) * 0.05);
                ctx.fillStyle = `rgba(0,0,0,${darkness})`;
                ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Jogador
    ctx.fillStyle = '#FF6347';
    ctx.fillRect(player.x, player.y, player.w, player.h);
}
</script>
</body>
</html>
