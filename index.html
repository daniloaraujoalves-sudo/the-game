<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Terraria Engine - Versão Final</title>
    <style>
        /* 1. ESTILIZAÇÃO (CSS) */
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10; font-size: 14px;
        }

        /* Container do Mini Mapa */
        #minimap-container {
            position: absolute; top: 10px; right: 10px;
            width: 200px; height: 120px;
            border: 2px solid #555; background: rgba(0, 0, 0, 0.8);
            border-radius: 4px; overflow: hidden; z-index: 100;
        }
        #minimapCanvas {
            width: 100%; height: 100%;
            image-rendering: pixelated; /* Mantém o visual de blocos */
        }

        /* Interface de Inventário */
        #inventory-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.7); padding: 10px;
            border-radius: 12px; border: 2px solid #444; z-index: 100;
        }
        .slot {
            width: 45px; height: 45px; background: #333;
            border: 2px solid #666; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.2s;
        }
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; background: #555; }
        .slot canvas { width: 30px; height: 30px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="info" id="debug-info">
        <b>WASD / Setas:</b> Mover e Pular | <b>1-5:</b> Itens<br>
        <b>Botão Esq:</b> Minerar | <b>Botão Dir:</b> Construir
    </div>

    <div id="minimap-container">
        <canvas id="minimapCanvas"></canvas>
    </div>

    <div id="inventory-ui">
        <div class="slot selected" id="slot-1"><div class="count">0</div></div>
        <div class="slot" id="slot-2"><div class="count">0</div></div>
        <div class="slot" id="slot-3"><div class="count">0</div></div>
        <div class="slot" id="slot-4"><div class="count">0</div></div>
        <div class="slot" id="slot-5"><div class="count">0</div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
// 2. LÓGICA DO JOGO (JAVASCRIPT)
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false }); // Otimização de performance
const miniCanvas = document.getElementById('minimapCanvas');
const mCtx = miniCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIGURAÇÕES ---
const TILE_SIZE = 40;
const WORLD_COLS = 5000; // Largura do mundo em blocos
const WORLD_ROWS = 100;  // Altura do mundo em blocos
const REACH = TILE_SIZE * 5; // Alcance do braço do jogador

// Blocos: 1:Grama, 2:Terra, 3:Pedra, 4:Madeira, 5:Folha, 6:Areia
const COLORS = { 1: "#4caf50", 2: "#795548", 3: "#9e9e9e", 4: "#5d4037", 5: "#2e7d32", 6: "#f4d03f" };
const DURABILITY = { 1: 10, 2: 10, 3: 35, 4: 20, 5: 5, 6: 8 };

let world = [], worldDamage = [];
const player = { 
    x: 1000, y: 0, // Posição inicial segura
    w: 22, h: 38, vx: 0, vy: 0, 
    speed: 6, jump: -13, onGround: false 
};

let inventory = { 1: 50, 2: 50, 3: 0, 4: 0, 6: 10 };
let selectedSlot = 1;
const keys = {};
let mouse = { x: 0, y: 0, left: false, right: false };
const camera = { x: 0, y: 0 };

// --- INICIALIZAÇÃO ---
const tex = {};
function initTextures() {
    for (let id in COLORS) {
        const c = document.createElement('canvas');
        c.width = 16; c.height = 16;
        const x = c.getContext('2d');
        x.fillStyle = COLORS[id];
        x.fillRect(0, 0, 16, 16);
        x.strokeStyle = "rgba(0,0,0,0.15)";
        x.strokeRect(0, 0, 16, 16);
        tex[id] = c;
    }
}

function initWorld() {
    miniCanvas.width = WORLD_COLS;
    miniCanvas.height = WORLD_ROWS;

    for (let y = 0; y < WORLD_ROWS; y++) {
        world[y] = new Int8Array(WORLD_COLS);
        worldDamage[y] = new Int16Array(WORLD_COLS);
        for (let x = 0; x < WORLD_COLS; x++) {
            let surface = Math.floor(50 + Math.sin(x * 0.08) * 6); // Relevo ondulado
            if (y >= surface) {
                let type = (y === surface) ? 1 : (y < surface + 10 ? 2 : 3);
                world[y][x] = type;
                worldDamage[y][x] = DURABILITY[type];
            }
        }
    }
    drawFullMinimap();
}

// --- FUNÇÕES DE MAPA ---
function drawFullMinimap() {
    mCtx.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
    for(let x=0; x<WORLD_COLS; x++) {
        for(let y=0; y<WORLD_ROWS; y++) {
            if(world[y][x] !== 0) {
                mCtx.fillStyle = COLORS[world[y][x]];
                mCtx.fillRect(x, y, 1, 1);
            }
        }
    }
}

function updateMinimapPixel(x, y) {
    if (world[y][x] === 0) mCtx.clearRect(x, y, 1, 1);
    else {
        mCtx.fillStyle = COLORS[world[y][x]];
        mCtx.fillRect(x, y, 1, 1);
    }
}

// --- COLISÃO ---
function isSolid(px, py) {
    let gx = Math.floor(px / TILE_SIZE);
    let gy = Math.floor(py / TILE_SIZE);
    if (gy < 0 || gy >= WORLD_ROWS || gx < 0 || gx >= WORLD_COLS) return false;
    return world[gy][gx] !== 0;
}

// --- CICLO DE ATUALIZAÇÃO ---
function update() {
    // 1. Movimento Lateral
    player.vx = (keys['KeyD'] || keys['ArrowRight'] ? player.speed : 0) - (keys['KeyA'] || keys['ArrowLeft'] ? player.speed : 0);
    player.x += player.vx;
    // Colisão X
    if (isSolid(player.x, player.y + 5) || isSolid(player.x + player.w, player.y + 5) ||
        isSolid(player.x, player.y + player.h - 5) || isSolid(player.x + player.w, player.y + player.h - 5)) {
        player.x -= player.vx;
    }

    // 2. Gravidade e Pulo
    player.vy += 0.7;
    player.y += player.vy;
    player.onGround = false;
    // Colisão Y (Chão)
    if (isSolid(player.x + 4, player.y + player.h) || isSolid(player.x + player.w - 4, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }
    if (player.onGround && (keys['Space'] || keys['KeyW'] || keys['ArrowUp'])) {
        player.vy = player.jump;
    }

    // 3. Câmera (Suave)
    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

    // 4. Mineração e Construção
    let mx = Math.floor((mouse.x + camera.x) / TILE_SIZE);
    let my = Math.floor((mouse.y + camera.y) / TILE_SIZE);
    let dist = Math.hypot((mouse.x+camera.x)-(player.x+player.w/2), (mouse.y+camera.y)-(player.y+player.h/2));

    if (dist < REACH && world[my]) {
        // Quebrar bloco
        if (mouse.left && world[my][mx] !== 0) {
            worldDamage[my][mx]--;
            if (worldDamage[my][mx] <= 0) {
                if (!inventory[world[my][mx]]) inventory[world[my][mx]] = 0;
                inventory[world[my][mx]]++;
                world[my][mx] = 0;
                updateUI();
                updateMinimapPixel(mx, my);
            }
        }
        // Colocar bloco
        if (mouse.right && world[my][mx] === 0 && inventory[selectedSlot] > 0) {
            // Evita construir em cima do jogador
            let pGX = Math.floor(player.x/TILE_SIZE), pGY = Math.floor(player.y/TILE_SIZE);
            if (!(mx >= pGX && mx <= Math.floor((player.x+player.w)/TILE_SIZE) && my >= pGY && my <= Math.floor((player.y+player.h)/TILE_SIZE))) {
                world[my][mx] = selectedSlot;
                worldDamage[my][mx] = DURABILITY[selectedSlot];
                inventory[selectedSlot]--;
                updateUI();
                updateMinimapPixel(mx, my);
            }
        }
    }

    // 5. Scroll do Minimapa
    let pGX = Math.floor(player.x / TILE_SIZE);
    miniCanvas.style.transform = `translateX(${100 - pGX}px)`;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    // Fundo (Céu)
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Renderização Otimizada (Apenas o que aparece na tela)
    let startC = Math.floor(camera.x / TILE_SIZE) - 1;
    let endC = startC + Math.ceil(canvas.width / TILE_SIZE) + 2;
    let startR = Math.floor(camera.y / TILE_SIZE) - 1;
    let endR = startR + Math.ceil(canvas.height / TILE_SIZE) + 2;

    for (let y = startR; y < endR; y++) {
        if (!world[y]) continue;
        for (let x = startC; x < endC; x++) {
            if (world[y][x] !== 0) {
                ctx.drawImage(tex[world[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Jogador
    ctx.fillStyle = "#ff5722";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.restore();
}

// --- INPUTS ---
window.onkeydown = (e) => { 
    keys[e.code] = true; 
    if (e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateUI(); }
};
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if(e.button === 0) mouse.left = true; if(e.button === 2) mouse.right = true; };
window.onmouseup = () => { mouse.left = false; mouse.right = false; };
canvas.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
canvas.oncontextmenu = (e) => e.preventDefault();

function updateUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.querySelector('.count').innerText = inventory[i] || 0;
        slot.classList.toggle('selected', selectedSlot === i);
        if (!slot.querySelector('canvas') && tex[i]) {
            const icon = document.createElement('canvas'); icon.width = 16; icon.height = 16;
            icon.getContext('2d').drawImage(tex[i], 0, 0); slot.appendChild(icon);
        }
    }
}

// Iniciar Jogo
initTextures();
initWorld();
updateUI();
update();
</script>
</body>
</html>
