<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Terraria JS - Biomes & Lighting Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        canvas { display: block; image-rendering: pixelated; cursor: crosshair; }
        
        /* UI Estilizada */
        .ui-container { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        #hp-bar { width: 200px; height: 15px; background: #1a1a1a; border: 2px solid #333; margin-bottom: 10px; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #d32f2f, #ff5252); transition: width 0.3s; }
        
        #hotbar { display: flex; gap: 5px; pointer-events: all; }
        .slot { width: 44px; height: 44px; background: rgba(30,30,60,0.8); border: 2px solid #1a1a3a; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .slot.selected { border-color: #fbff00; background: rgba(60,60,120,0.9); box-shadow: 0 0 10px rgba(251,255,0,0.3); }
        .count { position: absolute; bottom: 1px; right: 3px; color: white; font-size: 11px; text-shadow: 1px 1px black; }
        
        #debug-info { position: absolute; bottom: 10px; left: 10px; color: white; font-size: 12px; background: rgba(0,0,0,0.5); padding: 5px; }
        
        #minimap-container {
            position: absolute; top: 10px; right: 10px; width: 180px; height: 120px;
            border: 2px solid #444; background: #000; overflow: hidden; z-index: 100;
        }
        #minimap { width: 100%; height: 100%; image-rendering: pixelated; }
    </style>
</head>
<body>

<div class="ui-container">
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div id="hotbar"></div>
</div>

<div id="minimap-container"><canvas id="minimap"></canvas></div>
<div id="debug-info">Inicializando mundo...</div>
<canvas id="gameCanvas"></canvas>

<script>
/** CONFIGURAÇÕES GERAIS **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('minimap');
const mCtx = mCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
mCanvas.width = 180; mCanvas.height = 120;

const TILE_SIZE = 32;
const WORLD_W = 2000; // Mundo grande
const WORLD_H = 100;
const REACH = TILE_SIZE * 6;

// IDs: 1:Grama, 2:Terra, 3:Pedra, 4:Madeira, 5:Folhas, 6:Areia, 8:Ferro, 9:Carvão
const DURABILITY = { 1:10, 2:10, 3:30, 4:20, 5:5, 6:8, 8:50, 9:40 };
const tex = {};

let world = [], walls = [], light = [], damage = [];
const player = { 
    x: (WORLD_W * TILE_SIZE) / 2, y: 0, w: 20, h: 34, 
    vx: 0, vy: 0, hp: 100, selected: 1, 
    inv: {1:50, 2:50, 3:0, 4:20, 6:0, 8:0, 9:0} 
};
const camera = { x: 0, y: 0 };
const keys = {};
let mouse = { x: 0, y: 0, down: false, right: false };

/** GERADOR DE BIOMAS E TERRENO **/
function getBiome(x) {
    const v = Math.sin(x * 0.02);
    if (v > 0.7) return "AMAZONIA";
    if (v < -0.7) return "DESERTO";
    return "FLORESTA";
}

function initWorld() {
    for (let y = 0; y < WORLD_H; y++) {
        world[y] = new Int8Array(WORLD_W);
        walls[y] = new Int8Array(WORLD_W);
        light[y] = new Float32Array(WORLD_W);
        damage[y] = new Int16Array(WORLD_W);
    }

    for (let x = 0; x < WORLD_W; x++) {
        const biome = getBiome(x);
        let surf;
        if (biome === "AMAZONIA") surf = 30 + Math.sin(x * 0.1) * 10;
        else if (biome === "DESERTO") surf = 45 + Math.sin(x * 0.05) * 2;
        else surf = 40 + Math.sin(x * 0.08) * 6;

        surf = Math.floor(surf);

        for (let y = 0; y < WORLD_H; y++) {
            if (y >= surf) {
                // Cavernas
                let isCave = (Math.sin(x*0.2) + Math.sin(y*0.2)) > 1.3;
                
                if (!isCave) {
                    let type = (y === surf) ? (biome === "DESERTO" ? 6 : 1) : (y < surf + 10 ? (biome === "DESERTO" ? 6 : 2) : 3);
                    // Minérios raros
                    if (y > surf + 20 && Math.random() < 0.02) type = 8;
                    if (y > surf + 15 && Math.random() < 0.03) type = 9;
                    
                    world[y][x] = type;
                    damage[y][x] = DURABILITY[type];
                }
                // Parede de fundo sempre existe no subsolo
                walls[y][x] = (y < surf + 15) ? 2 : 3;
            }
        }

        // Árvores
        if (x % 12 === 0 && Math.random() > 0.3 && biome !== "DESERTO") {
            let th = biome === "AMAZONIA" ? 12 : 5;
            for(let i=1; i<th; i++) if(surf-i > 0) world[surf-i][x] = 4;
            // Folhas simples
            for(let ly=-2; ly<=0; ly++) {
                for(let lx=-1; lx<=1; lx++) {
                    if (world[surf-th+ly]) world[surf-th+ly][x+lx] = 5;
                }
            }
        }
    }
    // Posicionar player no chão
    player.y = (surf - 5) * TILE_SIZE;
}

/** ILUMINAÇÃO **/
function updateLighting() {
    for (let x = 0; x < WORLD_W; x++) {
        let sky = 1.0;
        for (let y = 0; y < WORLD_H; y++) {
            if (world[y][x] !== 0 && world[y][x] !== 5) sky -= 0.15;
            if (sky < 0) sky = 0;
            light[y][x] = sky;
        }
    }
}

/** TEXTURAS (Pixel Art Procedural) **/
function initTextures() {
    const p = { 
        1: "#4caf50", 2: "#795548", 3: "#777", 4: "#5d4037", 
        5: "#2e7d32", 6: "#f4d03f", 8: "#dcdde1", 9: "#2f3640" 
    };
    for (let id in p) {
        let t = document.createElement('canvas'); t.width = 16; t.height = 16;
        let c = t.getContext('2d');
        c.fillStyle = p[id]; c.fillRect(0,0,16,16);
        c.fillStyle = "rgba(0,0,0,0.15)"; c.fillRect(0,10,16,6);
        tex[id] = t;
    }
}

/** LÓGICA E FÍSICA **/
function checkColl(x, y) {
    let gx = Math.floor((x + 4) / TILE_SIZE);
    let gy = Math.floor((y + player.h) / TILE_SIZE);
    return world[gy] && world[gy][gx] !== 0 && world[gy][gx] !== 5;
}

function update() {
    // Movimento
    player.vx = keys['KeyA'] ? -5 : keys['KeyD'] ? 5 : 0;
    player.vy += 0.5;
    
    player.x += player.vx;
    if(checkColl(player.x, player.y)) player.x -= player.vx;
    
    player.y += player.vy;
    if(checkColl(player.x, player.y)) {
        player.y = Math.floor((player.y + player.h)/TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0;
        if(keys['Space'] || keys['KeyW']) player.vy = -10;
    }

    // Mouse / Interação
    let mx = mouse.x + camera.x, my = mouse.y + camera.y;
    let gx = Math.floor(mx/TILE_SIZE), gy = Math.floor(my/TILE_SIZE);

    if (world[gy] && Math.hypot(mx - (player.x+10), my - (player.y+17)) < REACH) {
        if (mouse.down && world[gy][gx] !== 0) {
            damage[gy][gx]--;
            if (damage[gy][gx] <= 0) {
                player.inv[world[gy][gx]] = (player.inv[world[gy][gx]] || 0) + 1;
                world[gy][gx] = 0;
                updateLighting();
                updateUI();
            }
        }
        if (mouse.right && world[gy][gx] === 0 && player.inv[player.selected] > 0) {
            world[gy][gx] = player.selected;
            damage[gy][gx] = DURABILITY[player.selected];
            player.inv[player.selected]--;
            updateLighting();
            updateUI();
        }
    }

    // Camera suave
    camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;
    camera.x = Math.max(0, Math.min(camera.x, WORLD_W * TILE_SIZE - canvas.width));

    draw();
    updateMinimap();
    
    document.getElementById('debug-info').innerText = `Biome: ${getBiome(Math.floor(player.x/TILE_SIZE))} | Pos: ${Math.floor(player.x)},${Math.floor(player.y)}`;
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#4a90e2"; // Céu
    ctx.fillRect(0,0,canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    let x0 = Math.floor(camera.x/TILE_SIZE)-1;
    let x1 = x0 + Math.ceil(canvas.width/TILE_SIZE)+2;
    let y0 = 0, y1 = WORLD_H;

    for(let y=y0; y<y1; y++) {
        for(let x=Math.max(0, x0); x<Math.min(WORLD_W, x1); x++) {
            // Paredes
            if (walls[y][x] !== 0) {
                ctx.fillStyle = walls[y][x] === 2 ? "#3a2a1a" : "#2a2a2a";
                ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
            // Blocos
            let id = world[y][x];
            if(id !== 0) {
                ctx.drawImage(tex[id], x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
            // Sombras/Luz
            if (light[y][x] < 1) {
                ctx.fillStyle = `rgba(0,0,0,${1 - light[y][x]})`;
                ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Player
    ctx.fillStyle = "#e67e22";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    
    ctx.restore();
    document.getElementById('hp-fill').style.width = player.hp + "%";
}

function updateMinimap() {
    mCtx.fillStyle = "#000"; mCtx.fillRect(0,0,180,120);
    let px = Math.floor(player.x/TILE_SIZE);
    let py = Math.floor(player.y/TILE_SIZE);
    
    for(let my=0; my<40; my++) {
        for(let mx=0; mx<60; mx++) {
            let wx = px - 30 + mx;
            let wy = py - 20 + my;
            if(world[wy] && world[wy][wx] !== undefined) {
                let id = world[wy][wx];
                if(id !== 0) {
                    mCtx.fillStyle = id === 1 ? "#4caf50" : (id === 6 ? "#f4d03f" : "#777");
                    mCtx.fillRect(mx*3, my*3, 3, 3);
                }
            }
        }
    }
    mCtx.fillStyle = "red"; mCtx.fillRect(30*3, 20*3, 4, 4);
}

function updateUI() {
    const hb = document.getElementById('hotbar'); hb.innerHTML = '';
    [1,2,3,4,6,8,9].forEach(id => {
        const s = document.createElement('div');
        s.className = `slot ${player.selected === id ? 'selected' : ''}`;
        s.onclick = () => { player.selected = id; updateUI(); };
        s.innerHTML = `<div class="count">${player.inv[id]||0}</div>`;
        let icon = document.createElement('canvas'); icon.width=16; icon.height=16;
        icon.getContext('2d').drawImage(tex[id],0,0);
        s.appendChild(icon);
        hb.appendChild(s);
    });
}

/** INPUTS **/
window.onkeydown = (e) => {
    keys[e.code] = true;
    if(e.key >= 1 && e.key <= 9) { 
        const ids = [1,2,3,4,6,8,9];
        if(ids[e.key-1]) { player.selected = ids[e.key-1]; updateUI(); }
    }
};
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if(e.button===0) mouse.down = true; if(e.button===2) mouse.right = true; };
window.onmouseup = () => { mouse.down = false; mouse.right = false; };
canvas.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
canvas.oncontextmenu = (e) => e.preventDefault();

// Start
initTextures();
initWorld();
updateLighting();
updateUI();
update();
</script>
</body>
</html>
