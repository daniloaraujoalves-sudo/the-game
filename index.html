<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Pulo e Árvores</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4da0ff; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #inventory-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.6); padding: 10px;
            border-radius: 12px; border: 2px solid #444; z-index: 100;
        }
        .slot {
            width: 50px; height: 50px; background: #333;
            border: 2px solid #666; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; background: #444; }
        .slot img { width: 32px; height: 32px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="info">
    <b>ESQUERDO:</b> Minerar | <b>DIREITO:</b> Construir<br>
    <b>W / ESPAÇO:</b> Pular | <b>1-5:</b> Itens | <b>A, D:</b> Mover
</div>

<div id="inventory-ui">
    <div class="slot selected" id="slot-1"><div class="count">0</div></div>
    <div class="slot" id="slot-2"><div class="count">0</div></div>
    <div class="slot" id="slot-3"><div class="count">0</div></div>
    <div class="slot" id="slot-4"><div class="count">0</div></div>
    <div class="slot" id="slot-5"><div class="count">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 40;
const REACH_DISTANCE = TILE_SIZE * 6;
const DURABILITY = { 1: 5, 2: 5, 3: 15, 4: 8, 5: 3 }; 

let inventory = { 1: 10, 2: 10, 3: 5, 4: 5, 5: 5 };
let selectedSlot = 1;

// --- Assets ---
let assetsLoaded = 0;
const onAssetLoad = () => { if (++assetsLoaded === 5) { generateTrees(); updateInventoryUI(); update(); } };

const imgGrama = new Image(); imgGrama.onload = onAssetLoad; imgGrama.src = "https://i.ibb.co/vYm68YV/grass.png";
const imgTerra = new Image(); imgTerra.onload = onAssetLoad; imgTerra.src = "https://i.ibb.co/f47Z4m0/dirt.png";
const imgPedra = new Image(); imgPedra.onload = onAssetLoad; imgPedra.src = "https://i.ibb.co/M6X8f5Y/stone.png";
const imgTronco = new Image(); imgTronco.onload = onAssetLoad; imgTronco.src = "https://i.ibb.co/9G738M6/wood.png";
const imgFolha = new Image(); imgFolha.onload = onAssetLoad; imgFolha.src = "https://i.ibb.co/yYy8mZ5/leaves.png";

// --- Mundo ---
const WORLD_COLS = 200, WORLD_ROWS = 60;
const WORLD_WIDTH = WORLD_COLS * TILE_SIZE, WORLD_HEIGHT = WORLD_ROWS * TILE_SIZE;
let world = [], worldDamage = [], treeWorld = [];

for (let y = 0; y < WORLD_ROWS; y++) {
    world[y] = []; worldDamage[y] = []; treeWorld[y] = [];
    for (let x = 0; x < WORLD_COLS; x++) {
        let type = (y === 25) ? 1 : (y > 25 && y < 35) ? 2 : (y >= 35) ? 3 : 0;
        world[y][x] = type;
        treeWorld[y][x] = 0;
        worldDamage[y][x] = type !== 0 ? DURABILITY[type] : 0;
    }
}

function generateTrees() {
    for (let x = 5; x < WORLD_COLS - 5; x += Math.floor(Math.random() * 10) + 5) {
        let height = 4 + Math.floor(Math.random() * 3);
        let groundY = 25;
        // Tronco
        for (let i = 1; i <= height; i++) {
            treeWorld[groundY - i][x] = 4;
            worldDamage[groundY - i][x] = DURABILITY[4];
        }
        // Folhas
        for (let fy = -2; fy <= 0; fy++) {
            for (let fx = -2; fx <= 2; fx++) {
                if (treeWorld[groundY - height + fy]) {
                    treeWorld[groundY - height + fy][x + fx] = 5;
                    worldDamage[groundY - height + fy][x + fx] = DURABILITY[5];
                }
            }
        }
    }
}

// --- Jogador ---
const player = { 
    x: WORLD_WIDTH / 2, y: 800, 
    w: 24, h: 38, 
    vx: 0, vy: 0, 
    speed: 5, jumpPower: -12, 
    onGround: false 
};

const keys = {};
const camera = { x: 0, y: 0 };
let isMouseDown = false, isRightMouseDown = false, mousePos = { x: 0, y: 0 };

window.onkeydown = (e) => {
    keys[e.code] = true;
    if (e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateInventoryUI(); }
};
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if (e.button === 0) isMouseDown = true; if (e.button === 2) isRightMouseDown = true; };
window.onmouseup = (e) => { if (e.button === 0) isMouseDown = false; if (e.button === 2) isRightMouseDown = false; };
canvas.onmousemove = (e) => { mousePos.x = e.clientX + camera.x; mousePos.y = e.clientY + camera.y; };
canvas.oncontextmenu = (e) => e.preventDefault();

function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE), gy = Math.floor(py / TILE_SIZE);
    return world[gy] && world[gy][gx] !== 0;
}

function update() {
    // Horizontal
    player.vx = keys['KeyA'] ? -player.speed : keys['KeyD'] ? player.speed : 0;
    player.x += player.vx;
    if (isSolid(player.x, player.y + 4) || isSolid(player.x, player.y + player.h - 4)) player.x = (Math.floor(player.x / TILE_SIZE) + 1) * TILE_SIZE;
    if (isSolid(player.x + player.w, player.y + 4) || isSolid(player.x + player.w, player.y + player.h - 4)) player.x = (Math.floor((player.x + player.w) / TILE_SIZE)) * TILE_SIZE - player.w;

    // Gravidade e Pulo
    player.vy += 0.6;
    player.y += player.vy;
    player.onGround = false;

    if (isSolid(player.x + 4, player.y + player.h) || isSolid(player.x + player.w - 4, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }

    if (player.onGround && (keys['Space'] || keys['KeyW'])) {
        player.vy = player.jumpPower;
        player.onGround = false;
    }

    // Interação com Blocos
    const gx = Math.floor(mousePos.x / TILE_SIZE);
    const gy = Math.floor(mousePos.y / TILE_SIZE);
    const dist = Math.hypot(mousePos.x - (player.x + player.w/2), mousePos.y - (player.y + player.h/2));

    if (dist <= REACH_DISTANCE && world[gy]) {
        if (isMouseDown) {
            let targetLayer = world[gy][gx] !== 0 ? world : (treeWorld[gy][gx] !== 0 ? treeWorld : null);
            if (targetLayer) {
                worldDamage[gy][gx]--;
                if (worldDamage[gy][gx] <= 0) {
                    inventory[targetLayer[gy][gx]]++;
                    targetLayer[gy][gx] = 0;
                    updateInventoryUI();
                }
            }
        }
        if (isRightMouseDown && inventory[selectedSlot] > 0 && world[gy][gx] === 0) {
             world[gy][gx] = selectedSlot;
             worldDamage[gy][gx] = DURABILITY[selectedSlot];
             inventory[selectedSlot]--;
             updateInventoryUI();
        }
    }

    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    // Fundo (Céu)
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, "#1e90ff");
    grad.addColorStop(1, "#87ceeb");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sC = Math.floor(camera.x / TILE_SIZE), eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 1;
    const sR = Math.floor(camera.y / TILE_SIZE), eR = sR + Math.ceil(canvas.height / TILE_SIZE) + 1;

    for (let y = sR; y < eR; y++) {
        for (let x = sC; x < eC; x++) {
            if (y >= 25 && (!world[y] || world[y][x] === 0)) {
                ctx.fillStyle = (y < 35) ? "#3d2b1f" : "#222"; 
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
            // Árvores
            if (treeWorld[y] && treeWorld[y][x] !== 0) {
                let img = treeWorld[y][x] === 4 ? imgTronco : imgFolha;
                ctx.drawImage(img, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
            // Blocos Sólidos
            if (world[y] && world[y][x] !== 0) {
                let img = world[y][x] === 1 ? imgGrama : (world[y][x] === 2 ? imgTerra : (world[y][x] === 3 ? imgPedra : (world[y][x] === 4 ? imgTronco : imgFolha)));
                ctx.drawImage(img, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Personagem
    ctx.fillStyle = '#ffeb3b';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.strokeStyle = '#000';
    ctx.strokeRect(player.x, player.y, player.w, player.h);

    ctx.restore();
}

function updateInventoryUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.querySelector('.count').innerText = inventory[i];
        slot.classList.toggle('selected', selectedSlot === i);
        if (inventory[i] > 0 && !slot.querySelector('img')) {
            const img = getImgByType(i).cloneNode();
            slot.appendChild(img);
        } else if (inventory[i] <= 0 && slot.querySelector('img')) {
            slot.querySelector('img').remove();
        }
    }
}

function getImgByType(t) {
    return [null, imgGrama, imgTerra, imgPedra, imgTronco, imgFolha][t];
}
</script>
</body>
</html>
