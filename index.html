<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Ciclo Dia/Noite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #inventory-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.7); padding: 10px;
            border-radius: 12px; border: 2px solid #444; z-index: 100;
        }
        .slot {
            width: 50px; height: 50px; background: #333;
            border: 2px solid #666; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; background: #555; }
        .slot canvas { width: 32px; height: 32px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="info">
    <b>A / D:</b> Mover | <b>W / ESPAÇO:</b> Pular<br>
    <b>ESQUERDO:</b> Minerar | <b>DIREITO:</b> Construir | <b>1-5:</b> Itens
</div>

<div id="inventory-ui">
    <div class="slot selected" id="slot-1"><div class="count">0</div></div>
    <div class="slot" id="slot-2"><div class="count">0</div></div>
    <div class="slot" id="slot-3"><div class="count">0</div></div>
    <div class="slot" id="slot-4"><div class="count">0</div></div>
    <div class="slot" id="slot-5"><div class="count">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 40;
const REACH_DISTANCE = TILE_SIZE * 5;
const DURABILITY = { 1: 10, 2: 10, 3: 30, 4: 20, 5: 8 }; 

// --- CICLO DE DIA E NOITE ---
let gameTime = 0; // Aumenta a cada frame
const DAY_LENGTH = 5000; // Duração total do ciclo em frames

// --- GERAÇÃO DE TEXTURAS ---
function createTexture(color1, color2, pattern = "block") {
    const tCanvas = document.createElement('canvas');
    tCanvas.width = 16; tCanvas.height = 16;
    const tCtx = tCanvas.getContext('2d');
    tCtx.fillStyle = color1;
    tCtx.fillRect(0, 0, 16, 16);
    tCtx.fillStyle = color2;
    if(pattern === "grass") tCtx.fillRect(0, 0, 16, 4);
    if(pattern === "block") {
        tCtx.globalAlpha = 0.3;
        tCtx.fillRect(0, 14, 16, 2); tCtx.fillRect(14, 0, 2, 16);
    }
    if(pattern === "leaves") {
        for(let i=0; i<8; i++) tCtx.fillRect(Math.random()*12, Math.random()*12, 4, 4);
    }
    return tCanvas;
}

const tex = {
    1: createTexture("#4caf50", "#2e7d32", "grass"), 
    2: createTexture("#795548", "#5d4037"),          
    3: createTexture("#9e9e9e", "#616161"),          
    4: createTexture("#5d4037", "#3e2723"),          
    5: createTexture("#2e7d32", "#1b5e20", "leaves") 
};

// --- MUNDO ---
const WORLD_COLS = 150, WORLD_ROWS = 60;
let world = [], worldDamage = [], treeWorld = [];

for (let y = 0; y < WORLD_ROWS; y++) {
    world[y] = []; worldDamage[y] = []; treeWorld[y] = [];
    for (let x = 0; x < WORLD_COLS; x++) {
        let surfaceY = Math.floor(25 + Math.sin(x * 0.1) * 4);
        let type = (y === surfaceY) ? 1 : (y > surfaceY && y < surfaceY + 10) ? 2 : (y >= surfaceY + 10) ? 3 : 0;
        world[y][x] = type;
        treeWorld[y][x] = 0;
        worldDamage[y][x] = type !== 0 ? DURABILITY[type] : 0;
    }
}

// --- JOGADOR ---
const player = { 
    x: (WORLD_COLS * TILE_SIZE) / 2, y: 0, 
    w: 22, h: 36, 
    vx: 0, vy: 0, 
    speed: 5, jump: -11, 
    onGround: false 
};

let inventory = { 1: 20, 2: 20, 3: 0, 4: 0, 5: 0 };
let selectedSlot = 1;
const keys = {};
const camera = { x: 0, y: 0 };
let isMouseDown = false, isRightMouseDown = false, mousePos = { x: 0, y: 0 };

window.onkeydown = (e) => { keys[e.code] = true; if (e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateUI(); } };
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if (e.button === 0) isMouseDown = true; if (e.button === 2) isRightMouseDown = true; };
window.onmouseup = (e) => { if (e.button === 0) isMouseDown = false; if (e.button === 2) isRightMouseDown = false; };
canvas.onmousemove = (e) => { mousePos.x = e.clientX + camera.x; mousePos.y = e.clientY + camera.y; };
canvas.oncontextmenu = (e) => e.preventDefault();

function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE), gy = Math.floor(py / TILE_SIZE);
    return world[gy] && world[gy][gx] !== 0;
}

function update() {
    gameTime = (gameTime + 1) % DAY_LENGTH;

    // MOVIMENTO E COLISÃO (CORRIGIDO)
    player.vx = keys['KeyA'] ? -player.speed : keys['KeyD'] ? player.speed : 0;
    
    // Eixo X
    player.x += player.vx;
    if (isSolid(player.x, player.y + 2) || isSolid(player.x, player.y + player.h - 2)) {
        player.x = (Math.floor(player.x / TILE_SIZE) + 1) * TILE_SIZE;
    }
    if (isSolid(player.x + player.w, player.y + 2) || isSolid(player.x + player.w, player.y + player.h - 2)) {
        player.x = Math.floor((player.x + player.w) / TILE_SIZE) * TILE_SIZE - player.w - 1;
    }

    // Eixo Y
    player.vy += 0.6;
    player.y += player.vy;
    player.onGround = false;

    if (isSolid(player.x + 2, player.y + player.h) || isSolid(player.x + player.w - 2, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }
    if (player.onGround && (keys['Space'] || keys['KeyW'])) player.vy = player.jump;

    // MINERAÇÃO / CONSTRUÇÃO
    const gx = Math.floor(mousePos.x / TILE_SIZE);
    const gy = Math.floor(mousePos.y / TILE_SIZE);
    const dist = Math.hypot(mousePos.x - (player.x + player.w/2), mousePos.y - (player.y + player.h/2));

    if (dist <= REACH_DISTANCE && world[gy]) {
        if (isMouseDown && world[gy][gx] !== 0) {
            worldDamage[gy][gx]--;
            if(worldDamage[gy][gx] <= 0) {
                inventory[world[gy][gx]]++;
                world[gy][gx] = 0;
                updateUI();
            }
        }
        if (isRightMouseDown && inventory[selectedSlot] > 0 && world[gy][gx] === 0) {
            if(gx !== Math.floor((player.x+player.w/2)/TILE_SIZE) || gy !== Math.floor((player.y+player.h/2)/TILE_SIZE)) {
                world[gy][gx] = selectedSlot;
                worldDamage[gy][gx] = DURABILITY[selectedSlot];
                inventory[selectedSlot]--;
                updateUI();
            }
        }
    }

    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    // COR DO CÉU (DINÂMICA)
    let dayRatio = Math.sin((gameTime / DAY_LENGTH) * Math.PI * 2); 
    // dayRatio varia de -1 (meia noite) a 1 (meio dia)
    let skyB = Math.max(20, 100 + dayRatio * 155); 
    let skyG = Math.max(10, 60 + dayRatio * 100);
    ctx.fillStyle = `rgb(0, ${skyG}, ${skyB})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sC = Math.floor(camera.x / TILE_SIZE) - 1, eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 2;
    const sR = Math.floor(camera.y / TILE_SIZE) - 1, eR = sR + Math.ceil(canvas.height / TILE_SIZE) + 2;

    for (let y = sR; y < eR; y++) {
        if (!world[y]) continue;
        for (let x = sC; x < eC; x++) {
            if (world[y][x] !== 0) {
                ctx.drawImage(tex[world[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                if(worldDamage[y][x] < DURABILITY[world[y][x]]) {
                    ctx.fillStyle = "rgba(0,0,0,0.5)";
                    ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE * (1 - worldDamage[y][x]/DURABILITY[world[y][x]]));
                }
            } else if (y > 30) {
                ctx.fillStyle = "rgba(0,0,0,0.2)";
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // JOGADOR
    ctx.fillStyle = "#ff5722";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    
    ctx.restore();

    // CAMADA DE ESCURIDÃO (NOITE)
    let nightOpacity = Math.max(0, -dayRatio * 0.7);
    ctx.fillStyle = `rgba(0, 0, 20, ${nightOpacity})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function updateUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.querySelector('.count').innerText = inventory[i] || 0;
        slot.classList.toggle('selected', selectedSlot === i);
    }
}

updateUI();
update();
</script>
</body>
</html>
