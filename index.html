<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Alcance Limitado</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4da0ff; font-family: sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

<div class="info">
    <b>ALCANCE LIMITADO:</b> Você só quebra blocos próximos.<br>
    <b>WASD:</b> Mover | <b>Clique:</b> Minerar
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Configurações ---
const TILE_SIZE = 40;
const REACH_DISTANCE = TILE_SIZE * 4; // Alcance de 4 blocos
const DURABILITY = { 1: 5, 2: 5, 3: 20, 4: 10 };

const WORLD_COLS = Math.ceil((canvas.width / TILE_SIZE) * 3);
const WORLD_ROWS = Math.ceil((canvas.height / TILE_SIZE) * 3);
const WORLD_WIDTH = WORLD_COLS * TILE_SIZE;
const WORLD_HEIGHT = WORLD_ROWS * TILE_SIZE;

// --- Carregamento (Simplificado para o exemplo) ---
let assetsLoaded = 0;
const totalAssets = 3;
function onAssetLoad() { if (++assetsLoaded === totalAssets) update(); }

const imgGrama = new Image(); imgGrama.onload = onAssetLoad;
imgGrama.src = "https://st2.depositphotos.com/1796420/8408/v/450/depositphotos_84083416-stock-illustration-texture-for-platformers-pixel-art.jpg";
const imgTerra = new Image(); imgTerra.onload = onAssetLoad;
imgTerra.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRtCbeyZC6PjgiaDttQFYo4r4TUHIJFCdumA&s";
const imgPedra = new Image(); imgPedra.onload = onAssetLoad;
imgPedra.src = "https://i.pinimg.com/236x/d3/5c/0c/d35c0c58fff90987e9532e808ded0008.jpg";

// --- Mundos ---
let world = [];
let worldDamage = [];
let treeWorld = [];

for (let y = 0; y < WORLD_ROWS; y++) {
    world[y] = []; worldDamage[y] = []; treeWorld[y] = [];
    for (let x = 0; x < WORLD_COLS; x++) {
        treeWorld[y][x] = 0;
        let type = (y === 15) ? 1 : (y > 15 && y < 25) ? 2 : (y >= 25) ? 3 : 0;
        world[y][x] = type;
        worldDamage[y][x] = type !== 0 ? DURABILITY[type] : 0;
    }
}

// Gerar Árvores
for (let x = 2; x < WORLD_COLS - 2; x++) {
    if (Math.random() > 0.85) {
        let h = 4;
        for (let i = 1; i <= h; i++) treeWorld[15-i][x] = 4;
        treeWorld[15-h-1][x] = 4; treeWorld[15-h-1][x-1] = 4; treeWorld[15-h-1][x+1] = 4;
        // Resetar vida das árvores
        for(let i=0; i<=h+1; i++) {
            if(worldDamage[15-i]) {
                worldDamage[15-i][x] = DURABILITY[4];
                worldDamage[15-i][x-1] = DURABILITY[4];
                worldDamage[15-i][x+1] = DURABILITY[4];
            }
        }
    }
}

const player = { x: WORLD_WIDTH / 2, y: 400, w: 24, h: 40, vx: 0, vy: 0, speed: 5, jump: -12, onGround: false };
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

const camera = { x: 0, y: 0 };
let isMouseDown = false;
let mousePos = { x: 0, y: 0 };

canvas.onmousedown = (e) => isMouseDown = true;
window.onmouseup = () => isMouseDown = false;
canvas.onmousemove = (e) => {
    mousePos.x = e.clientX + camera.x;
    mousePos.y = e.clientY + camera.y;
};

function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE);
    const gy = Math.floor(py / TILE_SIZE);
    return world[gy] && world[gy][gx] !== 0;
}

function handleMining() {
    if (!isMouseDown) return;

    // Calcular distância do centro do player até o mouse
    const pCenterX = player.x + player.w / 2;
    const pCenterY = player.y + player.h / 2;
    const dx = mousePos.x - pCenterX;
    const dy = mousePos.y - pCenterY;
    const distance = Math.sqrt(dx * dx + dy * dy);

    // Só minera se estiver dentro do alcance
    if (distance <= REACH_DISTANCE) {
        const gx = Math.floor(mousePos.x / TILE_SIZE);
        const gy = Math.floor(mousePos.y / TILE_SIZE);
        
        if (world[gy] && world[gy][gx] !== 0) {
            worldDamage[gy][gx]--;
            if (worldDamage[gy][gx] <= 0) world[gy][gx] = 0;
        } else if (treeWorld[gy] && treeWorld[gy][gx] !== 0) {
            worldDamage[gy][gx]--;
            if (worldDamage[gy][gx] <= 0) treeWorld[gy][gx] = 0;
        }
    }
}

function update() {
    if (keys['KeyA']) player.vx = -player.speed;
    else if (keys['KeyD']) player.vx = player.speed;
    else player.vx = 0;

    player.x += player.vx;
    if (isSolid(player.x, player.y) || isSolid(player.x, player.y + player.h - 1)) player.x = (Math.floor(player.x / TILE_SIZE) + 1) * TILE_SIZE;
    if (isSolid(player.x + player.w, player.y) || isSolid(player.x + player.w, player.y + player.h - 1)) player.x = (Math.floor((player.x + player.w) / TILE_SIZE)) * TILE_SIZE - player.w;

    if (keys['KeyW'] && player.onGround) { player.vy = player.jump; player.onGround = false; }
    player.vy += 0.6;
    player.y += player.vy;

    player.onGround = false;
    if (isSolid(player.x + 2, player.y + player.h) || isSolid(player.x + player.w - 2, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }

    handleMining();
    camera.x = Math.max(0, Math.min(player.x - canvas.width / 2, WORLD_WIDTH - canvas.width));
    camera.y = Math.max(0, Math.min(player.y - canvas.height / 2, WORLD_HEIGHT - canvas.height));
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Céu
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

    // Blocos e Árvores
    const sC = Math.floor(camera.x / TILE_SIZE);
    const eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 1;
    for (let y = 0; y < WORLD_ROWS; y++) {
        for (let x = sC; x < eC; x++) {
            if (treeWorld[y][x] === 4) {
                ctx.fillStyle = '#5d4037';
                ctx.globalAlpha = 0.6;
                ctx.fillRect(x * TILE_SIZE + 12, y * TILE_SIZE, TILE_SIZE - 24, TILE_SIZE);
                ctx.globalAlpha = 1;
            }
            if (world[y][x] !== 0) {
                let img = world[y][x] === 1 ? imgGrama : (world[y][x] === 2 ? imgTerra : imgPedra);
                ctx.drawImage(img, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                if (worldDamage[y][x] < DURABILITY[world[y][x]]) {
                    ctx.fillStyle = `rgba(0,0,0,${1 - (worldDamage[y][x]/DURABILITY[world[y][x]])})`;
                    ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
        }
    }

    // Indicador de Alcance (Círculo sutil)
    ctx.beginPath();
    ctx.arc(player.x + player.w/2, player.y + player.h/2, REACH_DISTANCE, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Jogador
    ctx.fillStyle = '#FF6347';
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.restore();
}
</script>
</body>
</html>
