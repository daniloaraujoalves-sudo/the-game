<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Pixel Art Style</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; user-select: none; }
        canvas { display: block; cursor: crosshair; image-rendering: pixelated; }
        
        /* UI Estilo Retro */
        .ui-container { position: absolute; top: 15px; left: 15px; z-index: 100; }
        #hp-bar { 
            width: 210px; height: 22px; background: #1a1a1a; 
            border: 3px solid #3d3d3d; border-radius: 0px; position: relative;
        }
        #hp-fill { 
            width: 100%; height: 100%; background: linear-gradient(to bottom, #ff2e2e, #8b0000); 
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.4);
        }
        
        #inventory-ui { 
            position: absolute; top: 50px; left: 15px; display: flex; gap: 4px; 
            background: rgba(40, 40, 80, 0.4); padding: 5px; border: 2px solid #222;
        }
        .slot { 
            width: 42px; height: 42px; background: rgba(50, 50, 100, 0.7); 
            border: 2px solid #1a1a3a; display: flex; align-items: center; justify-content: center; 
        }
        .slot.selected { border-color: #fbff00; background: rgba(100, 100, 200, 0.8); }
        .slot canvas { width: 30px; height: 30px; }
        .count { position: absolute; bottom: 1px; right: 2px; color: #fff; font-size: 12px; text-shadow: 1px 1px #000; }

        #location-label { color: #fff; text-shadow: 2px 2px #000; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="ui-container">
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div id="location-label">Superfície</div>
</div>

<div id="inventory-ui"></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/** CONFIGURAÇÕES **/
const TILE_SIZE = 40;
const WORLD_COLS = 1000;
const WORLD_ROWS = 120;
const GRAVITY = 0.45;
const DAY_LENGTH = 30000;

let world = [], lightMap = [], treeWorld = [];
let gameTime = 10000;
const tex = {};
const player = { x: 20000, y: 1200, w: 22, h: 38, vx: 0, vy: 0, hp: 100, selected: 1, inv: {1:99, 2:99, 3:99, 4:99, 6:99, 8:10} };
const camera = { x: 0, y: 0 };
const keys = {};
let mouse = { x: 0, y: 0, down: false };

/** TEXTURAS COM ESTILO PIXELADO **/
function initTextures() {
    const palette = {
        1: ["#48b04d", "#2d6b30", "grass"], 2: ["#8b5a2b", "#5d3a1a", "dirt"],
        3: ["#7a7a7a", "#4a4a4a", "stone"], 4: ["#6b4423", "#3d2714", "wood"],
        5: ["#2d9c3a", "#1a5e22", "leaves"], 6: ["#e3c16f", "#bca158", "sand"],
        7: ["#4a90e2", "#357abd", "water"], 8: ["#d3d3d3", "#808080", "iron"]
    };
    for (let id in palette) {
        const t = document.createElement('canvas');
        t.width = 16; t.height = 16;
        const tc = t.getContext('2d');
        tc.fillStyle = palette[id][0];
        tc.fillRect(0,0,16,16);
        tc.fillStyle = palette[id][1];
        if(palette[id][2] === "grass") tc.fillRect(0, 0, 16, 5);
        if(palette[id][2] === "dirt" || palette[id][2] === "stone") {
            for(let i=0; i<4; i++) tc.fillRect(Math.random()*12, Math.random()*12, 3, 3);
        }
        tex[id] = t;
    }
}

/** GERAÇÃO DE MUNDO E LUZ **/
function initWorld() {
    for (let y = 0; y < WORLD_ROWS; y++) {
        world[y] = new Int8Array(WORLD_COLS);
        treeWorld[y] = new Int8Array(WORLD_COLS);
        lightMap[y] = new Float32Array(WORLD_COLS);
    }

    for (let x = 0; x < WORLD_COLS; x++) {
        let surfaceY = 50 + Math.floor(Math.sin(x * 0.08) * 6 + Math.sin(x * 0.02) * 15);
        for (let y = 0; y < WORLD_ROWS; y++) {
            if (y > surfaceY) {
                let type = 2;
                if (y > surfaceY + 10) type = 3;
                if (y > surfaceY + 40 && Math.random() < 0.02) type = 8;
                world[y][x] = type;
            } else if (y === surfaceY) {
                world[y][x] = 1;
                if(x % 12 === 0 && Math.random() > 0.4) spawnTree(x, y);
            }
        }
    }
}

function spawnTree(x, y) {
    let h = 6 + Math.floor(Math.random() * 5);
    for(let i=1; i<=h; i++) if(y-i > 0) treeWorld[y-i][x] = 4;
    for(let ly=-3; ly<=0; ly++) {
        for(let lx=-2; lx<=2; lx++) {
            if(Math.abs(lx) + Math.abs(ly+1) < 4) treeWorld[y-h+ly][x+lx] = 5;
        }
    }
}

/** ILUMINAÇÃO (O SEGREDO DO ESTILO TERRARIA) **/
function calculateLight() {
    for (let x = 0; x < WORLD_COLS; x++) {
        let light = 1.0;
        for (let y = 0; y < WORLD_ROWS; y++) {
            if (world[y][x] !== 0) light -= 0.15; // Blocos bloqueiam a luz
            if (light < 0.1) light = 0.1;
            lightMap[y][x] = light;
        }
    }
}

function isSolid(x, y) {
    const gx = Math.floor(x / TILE_SIZE), gy = Math.floor(y / TILE_SIZE);
    return world[gy] && world[gy][gx] !== 0 && world[gy][gx] !== 7;
}

/** LOOP PRINCIPAL **/
function update() {
    gameTime = (gameTime + 1) % DAY_LENGTH;
    
    // Movimento do Player
    player.vx = keys['KeyA'] ? -5 : keys['KeyD'] ? 5 : 0;
    player.vy += GRAVITY;
    
    player.x += player.vx;
    if(isSolid(player.x, player.y+5) || isSolid(player.x+player.w, player.y+5)) player.x -= player.vx;
    
    player.y += player.vy;
    if(isSolid(player.x+2, player.y+player.h) || isSolid(player.x+player.w-2, player.y+player.h)) {
        player.y = Math.floor((player.y+player.h)/TILE_SIZE)*TILE_SIZE - player.h;
        player.vy = 0;
        if(keys['Space'] || keys['KeyW']) player.vy = -11;
    }

    // Mineração/Construção
    if(mouse.down) {
        const gx = Math.floor((mouse.x + camera.x)/TILE_SIZE);
        const gy = Math.floor((mouse.y + camera.y)/TILE_SIZE);
        if(world[gy] && world[gy][gx] !== 0) {
            world[gy][gx] = 0;
            calculateLight();
        }
    }

    camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    // 1. Céu com Gradiente Dinâmico
    const dayRatio = Math.sin((gameTime/DAY_LENGTH)*Math.PI);
    const skyColor = `rgb(${20*dayRatio}, ${120*dayRatio + 20}, ${230*dayRatio + 40})`;
    ctx.fillStyle = skyColor;
    ctx.fillRect(0,0,canvas.width, canvas.height);

    // 2. Paralaxe (Montanhas de fundo)
    ctx.fillStyle = `rgba(30, 60, 40, ${dayRatio})`;
    for(let i=0; i<10; i++) {
        let px = (i*400 - camera.x * 0.3) % 4000;
        ctx.beginPath();
        ctx.moveTo(px, canvas.height);
        ctx.lineTo(px + 200, canvas.height - 300);
        ctx.lineTo(px + 400, canvas.height);
        ctx.fill();
    }

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 3. Desenho do Mundo
    const sc = Math.floor(camera.x/TILE_SIZE)-1, ec = sc + Math.ceil(canvas.width/TILE_SIZE)+2;
    const sy = Math.floor(camera.y/TILE_SIZE)-1, ey = sy + Math.ceil(canvas.height/TILE_SIZE)+2;

    for(let y=Math.max(0, sy); y<Math.min(WORLD_ROWS, ey); y++) {
        for(let x=sc; x<ec; x++) {
            if(x<0 || x>=WORLD_COLS) continue;
            
            // Desenha blocos ou árvores
            let tid = world[y][x] || treeWorld[y][x];
            if(tid) {
                ctx.drawImage(tex[tid], x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                // Aplica a luz (Terraria style)
                ctx.fillStyle = `rgba(0,0,10,${1 - lightMap[y][x]})`;
                ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // 4. Player (Sprite Simples)
    ctx.fillStyle = "#ffccaa"; // Pele
    ctx.fillRect(player.x, player.y, player.w, player.h/2);
    ctx.fillStyle = "#3366ff"; // Calça
    ctx.fillRect(player.x, player.y + player.h/2, player.w, player.h/2);

    ctx.restore();

    // 5. Interface
    document.getElementById('hp-fill').style.width = player.hp + "%";
    document.getElementById('location-label').innerText = player.y > 2800 ? "Camada de Pedra" : "Superfície";
}

function updateUI() {
    const ui = document.getElementById('inventory-ui');
    ui.innerHTML = '';
    [1, 2, 3, 4, 6, 8].forEach(id => {
        const div = document.createElement('div');
        div.className = `slot ${player.selected === id ? 'selected' : ''}`;
        div.innerHTML = `<canvas id="c${id}"></canvas><div class="count">${player.inv[id]||0}</div>`;
        ui.appendChild(div);
        const iconCtx = div.querySelector('canvas').getContext('2d');
        setTimeout(() => iconCtx.drawImage(tex[id], 0, 0, 300, 150), 10);
    });
}

/** INPUTS **/
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = () => mouse.down = true;
window.onmouseup = () => mouse.down = false;
canvas.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };

/** INICIAR **/
initTextures();
initWorld();
calculateLight();
updateUI();
update();
</script>
</body>
</html>
