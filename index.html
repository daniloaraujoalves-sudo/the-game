<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4da0ff; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #inventory-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.7); padding: 10px;
            border-radius: 12px; border: 2px solid #444; z-index: 100;
        }
        .slot {
            width: 50px; height: 50px; background: #333;
            border: 2px solid #666; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; background: #555; }
        .slot canvas { width: 32px; height: 32px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="info">
    <b>ESQUERDO:</b> Minerar (Segure) | <b>DIREITO:</b> Construir<br>
    <b>W / ESPAÇO:</b> Pular | <b>1-5:</b> Itens | <b>A, D:</b> Mover
</div>

<div id="inventory-ui">
    <div class="slot selected" id="slot-1"><div class="count">0</div></div>
    <div class="slot" id="slot-2"><div class="count">0</div></div>
    <div class="slot" id="slot-3"><div class="count">0</div></div>
    <div class="slot" id="slot-4"><div class="count">0</div></div>
    <div class="slot" id="slot-5"><div class="count">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 40;
const REACH_DISTANCE = TILE_SIZE * 6;
// Durabilidade dos blocos (quantos frames leva para quebrar)
const DURABILITY = { 1: 15, 2: 15, 3: 40, 4: 25, 5: 10 }; 

// --- GERAÇÃO DE TEXTURAS ---
function createTexture(color1, color2, pattern = "block") {
    const tCanvas = document.createElement('canvas');
    tCanvas.width = 16; tCanvas.height = 16;
    const tCtx = tCanvas.getContext('2d');
    tCtx.fillStyle = color1;
    tCtx.fillRect(0, 0, 16, 16);
    tCtx.fillStyle = color2;
    if(pattern === "grass") tCtx.fillRect(0, 0, 16, 4);
    if(pattern === "block") {
        tCtx.globalAlpha = 0.3;
        tCtx.fillRect(0, 14, 16, 2); tCtx.fillRect(14, 0, 2, 16);
    }
    if(pattern === "leaves") {
        for(let i=0; i<8; i++) tCtx.fillRect(Math.random()*12, Math.random()*12, 4, 4);
    }
    return tCanvas;
}

const tex = {
    1: createTexture("#4caf50", "#2e7d32", "grass"), // Grama
    2: createTexture("#795548", "#5d4037"),          // Terra
    3: createTexture("#9e9e9e", "#616161"),          // Pedra
    4: createTexture("#5d4037", "#3e2723"),          // Tronco
    5: createTexture("#2e7d32", "#1b5e20", "leaves") // Folhas
};

// --- CONFIGURAÇÃO DO MUNDO ---
const WORLD_COLS = 200, WORLD_ROWS = 80;
let world = [], worldDamage = [], treeWorld = [];

// Gerador de Relevo (Senoidal)
for (let y = 0; y < WORLD_ROWS; y++) {
    world[y] = []; worldDamage[y] = []; treeWorld[y] = [];
    for (let x = 0; x < WORLD_COLS; x++) {
        // Cria montanhas suaves usando Math.sin
        let surfaceY = Math.floor(35 + Math.sin(x * 0.1) * 5 + Math.sin(x * 0.05) * 2);
        
        let type = 0;
        if (y === surfaceY) type = 1;
        else if (y > surfaceY && y < surfaceY + 7) type = 2;
        else if (y >= surfaceY + 7) type = 3;

        world[y][x] = type;
        treeWorld[y][x] = 0;
        worldDamage[y][x] = type !== 0 ? DURABILITY[type] : 0;
    }
}

// Gerar Árvores nas superfícies de grama
for (let x = 10; x < WORLD_COLS - 10; x += Math.floor(Math.random() * 10) + 7) {
    let surfaceY = -1;
    for(let y=0; y < WORLD_ROWS; y++) { if(world[y][x] === 1) { surfaceY = y; break; } }
    
    if(surfaceY !== -1) {
        let h = 4 + Math.floor(Math.random() * 3);
        for (let i = 1; i <= h; i++) treeWorld[surfaceY - i][x] = 4;
        for (let fy = -2; fy <= 0; fy++) {
            for (let fx = -2; fx <= 2; fx++) {
                if (surfaceY-h+fy >= 0) treeWorld[surfaceY - h + fy][x + fx] = 5;
            }
        }
    }
}

// --- JOGADOR ---
const player = { 
    x: (WORLD_COLS * TILE_SIZE) / 2, y: 0, 
    w: 24, h: 38, 
    vx: 0, vy: 0, 
    speed: 5, jump: -11, 
    onGround: false 
};

let inventory = { 1: 10, 2: 10, 3: 0, 4: 0, 5: 0 };
let selectedSlot = 1;
const keys = {};
const camera = { x: 0, y: 0 };
let isMouseDown = false, isRightMouseDown = false, mousePos = { x: 0, y: 0 };

window.onkeydown = (e) => { keys[e.code] = true; if (e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateUI(); } };
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if (e.button === 0) isMouseDown = true; if (e.button === 2) isRightMouseDown = true; };
window.onmouseup = (e) => { if (e.button === 0) isMouseDown = false; if (e.button === 2) isRightMouseDown = false; };
canvas.onmousemove = (e) => { 
    const rect = canvas.getBoundingClientRect();
    mousePos.x = e.clientX - rect.left + camera.x; 
    mousePos.y = e.clientY - rect.top + camera.y; 
};
canvas.oncontextmenu = (e) => e.preventDefault();

function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE), gy = Math.floor(py / TILE_SIZE);
    return world[gy] && world[gy][gx] !== 0;
}

function update() {
    // Movimento Lateral com Colisão Precisa
    player.vx = keys['KeyA'] ? -player.speed : keys['KeyD'] ? player.speed : 0;
    player.x += player.vx;
    
    if (isSolid(player.x, player.y + 2) || isSolid(player.x, player.y + player.h - 2)) player.x = (Math.floor(player.x / TILE_SIZE) + 1) * TILE_SIZE;
    if (isSolid(player.x + player.w, player.y + 2) || isSolid(player.x + player.w, player.y + player.h - 2)) player.x = Math.floor((player.x + player.w) / TILE_SIZE) * TILE_SIZE - player.w;

    // Gravidade e Pulo
    player.vy += 0.5;
    player.y += player.vy;
    player.onGround = false;

    if (isSolid(player.x + 4, player.y + player.h) || isSolid(player.x + player.w - 4, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }
    if (isSolid(player.x + 4, player.y) || isSolid(player.x + player.w - 4, player.y)) {
        player.y = (Math.floor(player.y / TILE_SIZE) + 1) * TILE_SIZE;
        player.vy = 0;
    }

    if (player.onGround && (keys['Space'] || keys['KeyW'])) player.vy = player.jump;

    // Mineração (Com Durabilidade)
    const gx = Math.floor(mousePos.x / TILE_SIZE);
    const gy = Math.floor(mousePos.y / TILE_SIZE);
    const dist = Math.hypot(mousePos.x - (player.x + player.w/2), mousePos.y - (player.y + player.h/2));

    if (dist <= REACH_DISTANCE && world[gy] && world[gy][gx] !== undefined) {
        if (isMouseDown) {
            if (world[gy][gx] !== 0) {
                worldDamage[gy][gx]--;
                if(worldDamage[gy][gx] <= 0) {
                    inventory[world[gy][gx]]++;
                    world[gy][gx] = 0;
                    updateUI();
                }
            } else if (treeWorld[gy][gx] !== 0) {
                inventory[treeWorld[gy][gx]]++;
                treeWorld[gy][gx] = 0;
                updateUI();
            }
        }
        // Construção
        if (isRightMouseDown && inventory[selectedSlot] > 0 && world[gy][gx] === 0 && treeWorld[gy][gx] === 0) {
            // Impedir construir em cima do jogador
            const pGx = Math.floor((player.x + player.w/2)/TILE_SIZE);
            const pGy = Math.floor((player.y + player.h/2)/TILE_SIZE);
            if(gx !== pGx || gy !== pGy) {
                world[gy][gx] = selectedSlot;
                worldDamage[gy][gx] = DURABILITY[selectedSlot];
                inventory[selectedSlot]--;
                updateUI();
            }
        }
    }

    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#4da0ff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sC = Math.floor(camera.x / TILE_SIZE) - 1, eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 2;
    const sR = Math.floor(camera.y / TILE_SIZE) - 1, eR = sR + Math.ceil(canvas.height / TILE_SIZE) + 2;

    for (let y = sR; y < eR; y++) {
        if (!world[y]) continue;
        for (let x = sC; x < eC; x++) {
            // Background de caverna
            if (y > 35 && world[y][x] === 0) {
                ctx.fillStyle = "rgba(30, 15, 5, 0.3)";
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
            if (treeWorld[y][x] !== 0) ctx.drawImage(tex[treeWorld[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            if (world[y][x] !== 0) {
                ctx.drawImage(tex[world[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                // Efeito visual de quebra
                if(worldDamage[y][x] < DURABILITY[world[y][x]]) {
                    ctx.fillStyle = "rgba(0,0,0,0.4)";
                    let breakSize = (1 - worldDamage[y][x] / DURABILITY[world[y][x]]) * TILE_SIZE;
                    ctx.fillRect(x * TILE_SIZE + (TILE_SIZE-breakSize)/2, y * TILE_SIZE + (TILE_SIZE-breakSize)/2, breakSize, breakSize);
                }
            }
        }
    }

    // Jogador
    ctx.fillStyle = "#ff5722";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    // Olhos do jogador para dar direção
    ctx.fillStyle = "white";
    let eyeDir = player.vx >= 0 ? 12 : 2;
    ctx.fillRect(player.x + eyeDir, player.y + 6, 8, 8);
    
    ctx.restore();
}

function updateUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.querySelector('.count').innerText = inventory[i];
        slot.classList.toggle('selected', selectedSlot === i);
        if (!slot.querySelector('canvas')) {
            const clone = document.createElement('canvas');
            clone.width = 16; clone.height = 16;
            clone.getContext('2d').drawImage(tex[i], 0, 0);
            slot.appendChild(clone);
        }
    }
}

updateUI();
update();
</script>
</body>
</html>
