<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Transição e Iluminação</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4da0ff; font-family: sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="info">
    <b>WASD:</b> Mover | <b>Clique:</b> Minerar<br>
    <i>Observe a transição terra-pedra e o brilho mineral</i>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- Sistema de Carregamento Seguro ---
let assetsLoaded = 0;
const totalAssets = 3;

function onAssetLoad() {
    assetsLoaded++;
    if (assetsLoaded === totalAssets) {
        update(); // Só inicia o loop quando tudo carregar
    }
}

const imgGrama = new Image();
imgGrama.onload = onAssetLoad;
imgGrama.src = "https://st2.depositphotos.com/1796420/8408/v/450/depositphotos_84083416-stock-illustration-texture-for-platformers-pixel-art.jpg";

const imgTerra = new Image();
imgTerra.onload = onAssetLoad;
imgTerra.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRtCbeyZC6PjgiaDttQFYo4r4TUHIJFCdumA&s";

const imgPedra = new Image();
imgPedra.onload = onAssetLoad;
imgPedra.src = "https://i.pinimg.com/236x/d3/5c/0c/d35c0c58fff90987e9532e808ded0008.jpg";

// --- Configurações ---
const TILE_SIZE = 40;
const ROWS = Math.ceil(canvas.height / TILE_SIZE);
const COLS = Math.ceil(canvas.width / TILE_SIZE);
const GRAVITY = 0.5;

let world = [];
for (let y = 0; y < ROWS; y++) {
    world[y] = [];
    for (let x = 0; x < COLS; x++) {
        if (y === 11) world[y][x] = 1;      // Grama
        else if (y > 11 && y < 16) {
            // Mistura terra e pedra na transição (y=15)
            if (y === 15 && Math.random() > 0.5) world[y][x] = 3;
            else world[y][x] = 2;
        }
        else if (y >= 16) world[y][x] = 3;   // Pedra
        else world[y][x] = 0;
    }
}

const player = {
    x: 100, y: 100, w: 26, h: 44,
    vx: 0, vy: 0, speed: 5, jump: -10, onGround: false
};

const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

canvas.onmousedown = (e) => {
    const gridX = Math.floor(e.clientX / TILE_SIZE);
    const gridY = Math.floor(e.clientY / TILE_SIZE);
    if (world[gridY]) world[gridY][gridX] = 0;
};

function update() {
    if (keys['KeyA']) player.vx = -player.speed;
    else if (keys['KeyD']) player.vx = player.speed;
    else player.vx = 0;

    if (keys['KeyW'] && player.onGround) {
        player.vy = player.jump;
        player.onGround = false;
    }

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    player.onGround = false;
    const pGridX = Math.floor((player.x + player.w/2) / TILE_SIZE);
    const pGridY = Math.floor((player.y + player.h) / TILE_SIZE);

    if (world[pGridY] && world[pGridY][pGridX] !== 0) {
        player.y = pGridY * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    // Fundo
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            const blockType = world[y][x];
            if (blockType === 0) continue;

            const posX = x * TILE_SIZE;
            const posY = y * TILE_SIZE;

            if (blockType === 1) {
                ctx.drawImage(imgGrama, posX, posY, TILE_SIZE, TILE_SIZE);
            } else if (blockType === 2) {
                ctx.drawImage(imgTerra, posX, posY, TILE_SIZE, TILE_SIZE);
            } else if (blockType === 3) {
                ctx.drawImage(imgPedra, posX, posY, TILE_SIZE, TILE_SIZE);
                
                // --- Efeito de Iluminação Dinâmica ---
                // Adiciona um "brilho mineral" (overlay branco sutil)
                ctx.globalCompositeOperation = 'overlay';
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(Math.sin(y * 0.5)) * 0.2})`;
                ctx.fillRect(posX, posY, TILE_SIZE, TILE_SIZE);
                ctx.globalCompositeOperation = 'source-over';

                // Escurece conforme a profundidade
                const darkness = Math.min(0.6, (y - 15) * 0.04);
                ctx.fillStyle = `rgba(0, 0, 0, ${darkness})`;
                ctx.fillRect(posX, posY, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    // Desenhar Jogador
    ctx.fillStyle = '#FF6347';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.strokeRect(player.x, player.y, player.w, player.h);
}
</script>
</body>
</html>
