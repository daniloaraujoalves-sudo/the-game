<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Inventário</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4da0ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; cursor: crosshair; }
        
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }

        /* --- Estilo do Inventário --- */
        #inventory-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #444;
            z-index: 100;
        }

        .slot {
            width: 50px;
            height: 50px;
            background: #333;
            border: 2px solid #666;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slot img {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
        }

        .count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 1px black;
        }
    </style>
</head>
<body>

<div class="info">
    <b>MINERAÇÃO:</b> Clique e segure para coletar itens.<br>
    <b>MOVIMENTAÇÃO:</b> W, A, D.
</div>

<div id="inventory-ui">
    <div class="slot" id="slot-1"><div class="count">0</div></div>
    <div class="slot" id="slot-2"><div class="count">0</div></div>
    <div class="slot" id="slot-3"><div class="count">0</div></div>
    <div class="slot" id="slot-4"><div class="count">0</div></div>
    <div class="slot" id="slot-5"><div class="count">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 40;
const REACH_DISTANCE = TILE_SIZE * 5;
const DURABILITY = { 1: 5, 2: 5, 3: 15, 4: 10, 5: 5 }; 

// Nomes para o inventário
const ITEM_NAMES = { 1: "Grama", 2: "Terra", 3: "Pedra", 4: "Madeira", 5: "Folha" };

// --- Sistema de Inventário ---
let inventory = {
    1: 0, // Grama
    2: 0, // Terra
    3: 0, // Pedra
    4: 0, // Madeira
    5: 0  // Folha
};

function addToInventory(type) {
    if (type === 0) return;
    inventory[type]++;
    updateInventoryUI();
}

function updateInventoryUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        const countText = slot.querySelector('.count');
        
        countText.innerText = inventory[i];
        
        // Adiciona a imagem se ainda não existir no slot
        if (inventory[i] > 0 && !slot.querySelector('img')) {
            const imgClone = getImgByType(i).cloneNode();
            slot.appendChild(imgClone);
        }
    }
}

function getImgByType(type) {
    if (type === 1) return imgGrama;
    if (type === 2) return imgTerra;
    if (type === 3) return imgPedra;
    if (type === 4) return imgTronco;
    if (type === 5) return imgFolha;
}

// --- Restante do Código Original ---
const WORLD_COLS = 200;
const WORLD_ROWS = 60; 
const WORLD_WIDTH = WORLD_COLS * TILE_SIZE;
const WORLD_HEIGHT = WORLD_ROWS * TILE_SIZE;

let assetsLoaded = 0;
const totalAssets = 5;
function onAssetLoad() { if (++assetsLoaded === totalAssets) { updateInventoryUI(); update(); } }

const imgGrama = new Image(); imgGrama.onload = onAssetLoad;
imgGrama.src = "https://st2.depositphotos.com/1796420/8408/v/450/depositphotos_84083416-stock-illustration-texture-for-platformers-pixel-art.jpg";
const imgTerra = new Image(); imgTerra.onload = onAssetLoad;
imgTerra.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRtCbeyZC6PjgiaDttQFYo4r4TUHIJFCdumA&s";
const imgPedra = new Image(); imgPedra.onload = onAssetLoad;
imgPedra.src = "https://i.pinimg.com/236x/d3/5c/0c/d35c0c58fff90987e9532e808ded0008.jpg";
const imgTronco = new Image(); imgTronco.onload = onAssetLoad;
imgTronco.src = "https://i.pinimg.com/736x/10/61/7b/10617b804bd2581499fcbea1426439f1.jpg";
const imgFolha = new Image(); imgFolha.onload = onAssetLoad;
imgFolha.src = "https://i.pinimg.com/1200x/09/c5/2d/09c52d89d8086495ab609332e6d55e85.jpg";

let world = [];
let worldDamage = [];
let treeWorld = [];

for (let y = 0; y < WORLD_ROWS; y++) {
    world[y] = []; worldDamage[y] = []; treeWorld[y] = [];
    for (let x = 0; x < WORLD_COLS; x++) {
        treeWorld[y][x] = 0;
        let type = (y === 15) ? 1 : (y > 15 && y < 30) ? 2 : (y >= 30) ? 3 : 0;
        world[y][x] = type;
        worldDamage[y][x] = type !== 0 ? DURABILITY[type] : 0;
    }
}

for (let x = 5; x < WORLD_COLS - 5; x++) {
    if (Math.random() > 0.9) {
        let h = 4 + Math.floor(Math.random() * 3); 
        for (let i = 1; i <= h; i++) {
            treeWorld[15-i][x] = 4;
            worldDamage[15-i][x] = DURABILITY[4];
        }
        const topY = 15 - h - 1;
        [[topY, x], [topY, x-1], [topY, x+1], [topY-1, x]].forEach(([ly, lx]) => {
            if (treeWorld[ly]) { 
                treeWorld[ly][lx] = 5; 
                worldDamage[ly][lx] = DURABILITY[5]; 
            }
        });
    }
}

const player = { x: WORLD_WIDTH / 2, y: 400, w: 22, h: 38, vx: 0, vy: 0, speed: 5, jump: -11, onGround: false };
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

const camera = { x: 0, y: 0 };
let isMouseDown = false;
let mousePos = { x: 0, y: 0 };

canvas.onmousedown = () => isMouseDown = true;
window.onmouseup = () => isMouseDown = false;
canvas.onmousemove = (e) => {
    mousePos.x = e.clientX + camera.x;
    mousePos.y = e.clientY + camera.y;
};

function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE);
    const gy = Math.floor(py / TILE_SIZE);
    return world[gy] && world[gy][gx] !== 0;
}

function drawMountains(parallaxFactor, color, baseHeight, peakHeight) {
    const startX = - (camera.x * parallaxFactor) % 1200;
    ctx.fillStyle = color;
    for (let i = -1; i < (canvas.width / 1200) + 1; i++) {
        const x = startX + i * 1200;
        ctx.beginPath();
        ctx.moveTo(x, canvas.height);
        ctx.lineTo(x + 300, canvas.height - baseHeight - peakHeight * 0.7);
        ctx.lineTo(x + 600, canvas.height - baseHeight - peakHeight);
        ctx.lineTo(x + 900, canvas.height - baseHeight - peakHeight * 0.5);
        ctx.lineTo(x + 1200, canvas.height);
        ctx.fill();
    }
}

function update() {
    player.vx = keys['KeyA'] ? -player.speed : keys['KeyD'] ? player.speed : 0;
    player.x += player.vx;
    if (isSolid(player.x, player.y + 2) || isSolid(player.x, player.y + player.h - 2)) player.x = (Math.floor(player.x / TILE_SIZE) + 1) * TILE_SIZE;
    if (isSolid(player.x + player.w, player.y + 2) || isSolid(player.x + player.w, player.y + player.h - 2)) player.x = (Math.floor((player.x + player.w) / TILE_SIZE)) * TILE_SIZE - player.w;

    if (keys['KeyW'] && player.onGround) { player.vy = player.jump; player.onGround = false; }
    player.vy += 0.55;
    player.y += player.vy;

    player.onGround = false;
    if (isSolid(player.x + 2, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0; player.onGround = true;
    }

    // Lógica de Mineração Atualizada com Coleta
    if (isMouseDown) {
        const dx = mousePos.x - (player.x + player.w/2);
        const dy = mousePos.y - (player.y + player.h/2);
        if (Math.sqrt(dx*dx + dy*dy) <= REACH_DISTANCE) {
            const gx = Math.floor(mousePos.x / TILE_SIZE);
            const gy = Math.floor(mousePos.y / TILE_SIZE);
            
            // Blocos de Solo
            if (world[gy] && world[gy][gx] !== 0) {
                worldDamage[gy][gx]--;
                if (worldDamage[gy][gx] <= 0) {
                    addToInventory(world[gy][gx]); // Coleta
                    world[gy][gx] = 0;
                }
            } 
            // Árvores
            else if (treeWorld[gy] && treeWorld[gy][gx] !== 0) {
                worldDamage[gy][gx]--;
                if (worldDamage[gy][gx] <= 0) {
                    addToInventory(treeWorld[gy][gx]); // Coleta
                    treeWorld[gy][gx] = 0;
                }
            }
        }
    }

    camera.x = Math.max(0, Math.min(player.x - canvas.width / 2, WORLD_WIDTH - canvas.width));
    camera.y = Math.max(0, Math.min(player.y - canvas.height / 2, WORLD_HEIGHT - canvas.height));
    
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawMountains(0.1, '#5f9ea0', 200, 500); 
    drawMountains(0.25, '#4682b4', 150, 350); 

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sC = Math.floor(camera.x / TILE_SIZE);
    const eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 1;
    const sR = Math.floor(camera.y / TILE_SIZE);
    const eR = sR + Math.ceil(canvas.height / TILE_SIZE) + 1;

    for (let y = sR; y < eR; y++) {
        for (let x = sC; x < eC; x++) {
            if (y >= 15) {
                ctx.fillStyle = (y < 30) ? "#2c1e14" : "#1a1a1a"; 
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }

            if (treeWorld[y] && treeWorld[y][x] !== 0) {
                ctx.globalAlpha = 0.8;
                let tImg = treeWorld[y][x] === 4 ? imgTronco : imgFolha;
                let off = treeWorld[y][x] === 4 ? 8 : 0;
                ctx.drawImage(tImg, x * TILE_SIZE + off, y * TILE_SIZE, TILE_SIZE - (off*2), TILE_SIZE);
                ctx.globalAlpha = 1;
            }

            if (world[y] && world[y][x] !== 0) {
                let img = world[y][x] === 1 ? imgGrama : (world[y][x] === 2 ? imgTerra : imgPedra);
                ctx.drawImage(img, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                
                const maxDur = DURABILITY[world[y][x]];
                const currentDur = worldDamage[y][x];
                
                if (currentDur < maxDur) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.1 + (1 - currentDur/maxDur) * 0.4})`;
                    ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);

                    ctx.strokeStyle = "rgba(255, 0, 0, 0.7)";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(x * TILE_SIZE + 10, y * TILE_SIZE + 10);
                    ctx.lineTo(x * TILE_SIZE + TILE_SIZE - 10, y * TILE_SIZE + TILE_SIZE - 10);
                    ctx.moveTo(x * TILE_SIZE + TILE_SIZE - 10, y * TILE_SIZE + 10);
                    ctx.lineTo(x * TILE_SIZE + 10, y * TILE_SIZE + TILE_SIZE - 10);
                    ctx.stroke();
                }
            }
        }
    }

    ctx.fillStyle = '#FF6347';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.restore();
}
</script>
</body>
</html>
