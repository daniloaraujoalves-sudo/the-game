<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Mundo Colossal (600.000px)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #inventory-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.7); padding: 10px;
            border-radius: 12px; border: 2px solid #444; z-index: 100;
        }
        .slot {
            width: 50px; height: 50px; background: #333;
            border: 2px solid #666; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; background: #555; }
        .slot canvas { width: 32px; height: 32px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="info">
    <b>A, D:</b> Mover | <b>W:</b> Pular | <b>TAMANHO:</b> 600.000px (15.000 Blocos)<br>
    <b>Clique Esq:</b> Minerar | <b>Clique Dir:</b> Construir | <b>1-5:</b> Itens
</div>

<div id="inventory-ui">
    <div class="slot selected" id="slot-1"><div class="count">0</div></div>
    <div class="slot" id="slot-2"><div class="count">0</div></div>
    <div class="slot" id="slot-3"><div class="count">0</div></div>
    <div class="slot" id="slot-4"><div class="count">0</div></div>
    <div class="slot" id="slot-5"><div class="count">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIGURAÇÃO DO MUNDO ---
const TILE_SIZE = 40;
const WORLD_WIDTH_PX = 600000; // 600.000 Pixels!
const WORLD_COLS = Math.floor(WORLD_WIDTH_PX / TILE_SIZE); // 15.000 Colunas
const WORLD_ROWS = 80;
const REACH_DISTANCE = TILE_SIZE * 5;
const DURABILITY = { 1: 15, 2: 15, 3: 40, 4: 25, 5: 10 };

let gameTime = 1500;
const DAY_LENGTH = 12000;

// --- TEXTURAS ---
const tex = {};
function initTextures() {
    const colors = {
        1: ["#4caf50", "#2e7d32", "grass"],
        2: ["#795548", "#5d4037", "block"],
        3: ["#9e9e9e", "#616161", "block"],
        4: ["#5d4037", "#3e2723", "block"],
        5: ["#2e7d32", "#1b5e20", "leaves"]
    };
    for (let id in colors) {
        const tCanvas = document.createElement('canvas');
        tCanvas.width = 16; tCanvas.height = 16;
        const tCtx = tCanvas.getContext('2d');
        tCtx.fillStyle = colors[id][0];
        tCtx.fillRect(0, 0, 16, 16);
        tCtx.fillStyle = colors[id][1];
        if(colors[id][2] === "grass") tCtx.fillRect(0, 0, 16, 5);
        if(colors[id][2] === "block") { tCtx.globalAlpha = 0.3; tCtx.fillRect(0, 13, 16, 3); tCtx.fillRect(13, 0, 3, 16); }
        tex[id] = tCanvas;
    }
}

// --- MUNDO E ÁRVORES ---
let world = [], worldDamage = [], treeWorld = [];
function initWorld() {
    console.log("Gerando mundo colossal...");
    for (let y = 0; y < WORLD_ROWS; y++) {
        world[y] = new Int8Array(WORLD_COLS); // Int8Array economiza MUITA memória
        worldDamage[y] = new Int16Array(WORLD_COLS);
        treeWorld[y] = new Int8Array(WORLD_COLS);
        
        for (let x = 0; x < WORLD_COLS; x++) {
            // Relevo mais variado para 600k px
            let surfaceY = Math.floor(35 + Math.sin(x * 0.08) * 6 + Math.cos(x * 0.03) * 3);
            let type = (y === surfaceY) ? 1 : (y > surfaceY && y < surfaceY + 12) ? 2 : (y >= surfaceY + 12) ? 3 : 0;
            world[y][x] = type;
            worldDamage[y][x] = type !== 0 ? DURABILITY[type] : 0;
        }
    }

    // Gerar Árvores em massa
    for (let x = 10; x < WORLD_COLS - 10; x += Math.floor(Math.random() * 12) + 8) {
        if(Math.random() > 0.3) {
            let groundY = -1;
            for(let y = 0; y < WORLD_ROWS; y++) {
                if(world[y][x] === 1) { groundY = y; break; }
            }
            if(groundY > 15) {
                let h = 4 + Math.floor(Math.random() * 4);
                // Tronco
                for(let i=1; i<=h; i++) treeWorld[groundY-i][x] = 4;
                // Copa
                let leafY = groundY - h;
                for(let ly=-3; ly<=0; ly++) {
                    for(let lx=-2; lx<=2; lx++) {
                        if(Math.abs(lx) + Math.abs(ly+1) < 4) {
                            if(treeWorld[leafY+ly]) treeWorld[leafY+ly][x+lx] = 5;
                        }
                    }
                }
            }
        }
    }
}

// --- JOGADOR ---
const player = { 
    x: 300000, y: 0, // Começa no meio do mundo (300k px)
    w: 20, h: 36, 
    vx: 0, vy: 0, 
    speed: 6, jump: -12, 
    onGround: false 
};

let inventory = { 1: 99, 2: 99, 3: 0, 4: 0, 5: 0 };
let selectedSlot = 1;
const keys = {};
const camera = { x: 0, y: 0 };
let mousePos = { x: 0, y: 0 }, isMouseDown = false, isRightMouseDown = false;

function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE);
    const gy = Math.floor(py / TILE_SIZE);
    if (gx < 0 || gx >= WORLD_COLS || gy < 0) return false;
    if (gy >= WORLD_ROWS) return true;
    return world[gy][gx] !== 0;
}

window.onkeydown = (e) => { keys[e.code] = true; if (e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateUI(); } };
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if (e.button === 0) isMouseDown = true; if (e.button === 2) isRightMouseDown = true; };
window.onmouseup = () => { isMouseDown = false; isRightMouseDown = false; };
canvas.onmousemove = (e) => { 
    mousePos.x = e.clientX + camera.x; 
    mousePos.y = e.clientY + camera.y; 
};
canvas.oncontextmenu = (e) => e.preventDefault();

function update() {
    gameTime = (gameTime + 1) % DAY_LENGTH;

    // MOVIMENTO X
    player.vx = keys['KeyA'] ? -player.speed : keys['KeyD'] ? player.speed : 0;
    player.x += player.vx;

    if (player.x < 0) player.x = 0;
    if (player.x > WORLD_WIDTH_PX - player.w) player.x = WORLD_WIDTH_PX - player.w;

    if (isSolid(player.x, player.y + 5) || isSolid(player.x + player.w, player.y + 5) ||
        isSolid(player.x, player.y + player.h - 5) || isSolid(player.x + player.w, player.y + player.h - 5)) {
        if (player.vx > 0) player.x = Math.floor((player.x + player.w) / TILE_SIZE) * TILE_SIZE - player.w - 0.1;
        else if (player.vx < 0) player.x = Math.floor(player.x / TILE_SIZE) * TILE_SIZE + TILE_SIZE + 0.1;
    }

    // MOVIMENTO Y
    player.vy += 0.65;
    player.y += player.vy;
    player.onGround = false;

    if (isSolid(player.x + 2, player.y + player.h) || isSolid(player.x + player.w - 2, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0;
        player.onGround = true;
    }
    if (player.onGround && (keys['Space'] || keys['KeyW'])) player.vy = player.jump;

    // INTERAÇÃO
    const gx = Math.floor(mousePos.x / TILE_SIZE);
    const gy = Math.floor(mousePos.y / TILE_SIZE);
    const dist = Math.hypot(mousePos.x - (player.x + player.w/2), mousePos.y - (player.y + player.h/2));

    if (dist <= REACH_DISTANCE && gy >= 0 && gy < WORLD_ROWS && gx >= 0 && gx < WORLD_COLS) {
        if (isMouseDown) {
            if (world[gy][gx] !== 0) {
                worldDamage[gy][gx]--;
                if(worldDamage[gy][gx] <= 0) {
                    inventory[world[gy][gx]]++;
                    world[gy][gx] = 0;
                    updateUI();
                }
            } else if (treeWorld[gy][gx] !== 0) {
                inventory[treeWorld[gy][gx]]++;
                treeWorld[gy][gx] = 0;
                updateUI();
            }
        }
        if (isRightMouseDown && world[gy][gx] === 0 && treeWorld[gy][gx] === 0 && inventory[selectedSlot] > 0) {
            if(gx !== Math.floor((player.x+player.w/2)/TILE_SIZE) || gy !== Math.floor((player.y+player.h/2)/TILE_SIZE)) {
                world[gy][gx] = selectedSlot;
                worldDamage[gy][gx] = DURABILITY[selectedSlot];
                inventory[selectedSlot]--;
                updateUI();
            }
        }
    }

    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;
    camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH_PX - canvas.width));
    camera.y = Math.max(0, Math.min(camera.y, (WORLD_ROWS * TILE_SIZE) - canvas.height));

    draw();
    requestAnimationFrame(update);
}

function draw() {
    let dayRatio = Math.sin((gameTime / DAY_LENGTH) * Math.PI * 2); 
    ctx.fillStyle = `rgb(0, ${Math.max(10, 60 + dayRatio * 100)}, ${Math.max(20, 100 + dayRatio * 155)})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sCol = Math.floor(camera.x / TILE_SIZE) - 1, eCol = sCol + Math.ceil(canvas.width / TILE_SIZE) + 2;
    const sRow = Math.floor(camera.y / TILE_SIZE) - 1, eRow = sRow + Math.ceil(canvas.height / TILE_SIZE) + 2;

    for (let y = sRow; y < eRow; y++) {
        if (y < 0 || y >= WORLD_ROWS) continue;
        for (let x = sCol; x < eCol; x++) {
            if (x < 0 || x >= WORLD_COLS) continue;
            
            if (y > 35 && world[y][x] === 0) {
                ctx.fillStyle = "rgba(0,0,0,0.1)";
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
            if (treeWorld[y][x] !== 0) ctx.drawImage(tex[treeWorld[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            if (world[y][x] !== 0) {
                ctx.drawImage(tex[world[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                if(worldDamage[y][x] < DURABILITY[world[y][x]]) {
                    ctx.fillStyle = "rgba(0,0,0,0.4)";
                    ctx.fillRect(x*TILE_SIZE, y*TILE_SIZE + (TILE_SIZE * (worldDamage[y][x]/DURABILITY[world[y][x]])), TILE_SIZE, TILE_SIZE);
                }
            }
        }
    }

    ctx.fillStyle = "#ff5722";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.restore();

    let nightOpacity = Math.max(0, -dayRatio * 0.65);
    ctx.fillStyle = `rgba(0, 0, 30, ${nightOpacity})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function updateUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.querySelector('.count').innerText = inventory[i] || 0;
        slot.classList.toggle('selected', selectedSlot === i);
        if (!slot.querySelector('canvas') && tex[i]) {
            const icon = document.createElement('canvas');
            icon.width = 16; icon.height = 16;
            icon.getContext('2d').drawImage(tex[i], 0, 0);
            slot.appendChild(icon);
        }
    }
}

initTextures();
initWorld();
updateUI();
update();
</script>
</body>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIGURAÇÃO ---
const TILE_SIZE = 40;
const WORLD_WIDTH_PX = 600000;
const WORLD_COLS = Math.floor(WORLD_WIDTH_PX / TILE_SIZE);
const WORLD_ROWS = 90;
const REACH_DISTANCE = TILE_SIZE * 5;

// IDs de Blocos: 1: Grama, 2: Terra, 3: Pedra, 4: Madeira, 5: Folha, 6: Areia, 7: Água(Visual)
const DURABILITY = { 1: 15, 2: 15, 3: 40, 4: 25, 5: 10, 6: 12, 7: 999 };

let gameTime = 2000;
const DAY_LENGTH = 15000;

// --- TEXTURAS ---
const tex = {};
function initTextures() {
    const colors = {
        1: ["#4caf50", "#2e7d32", "grass"], // Grama
        2: ["#795548", "#5d4037", "block"], // Terra
        3: ["#9e9e9e", "#616161", "block"], // Pedra
        4: ["#5d4037", "#3e2723", "block"], // Madeira
        5: ["#2e7d32", "#1b5e20", "leaves"],// Folhas
        6: ["#f4d03f", "#d4ac0d", "block"], // Areia
        7: ["#3498db", "#2980b9", "water"]  // Água
    };
    for (let id in colors) {
        const tCanvas = document.createElement('canvas');
        tCanvas.width = 16; tCanvas.height = 16;
        const tCtx = tCanvas.getContext('2d');
        tCtx.fillStyle = colors[id][0];
        tCtx.fillRect(0, 0, 16, 16);
        tCtx.fillStyle = colors[id][1];
        if(colors[id][2] === "grass") tCtx.fillRect(0, 0, 16, 5);
        if(colors[id][2] === "block") { tCtx.globalAlpha = 0.3; tCtx.fillRect(0, 13, 16, 3); tCtx.fillRect(13, 0, 3, 16); }
        if(colors[id][2] === "water") { tCtx.globalAlpha = 0.5; tCtx.fillRect(0, 0, 16, 8); }
        tex[id] = tCanvas;
    }
}

// --- GERAÇÃO DE MUNDO COM BIOMAS ---
let world = [], worldDamage = [], treeWorld = [];
function getBiome(x) {
    if (x < 1500 || x > WORLD_COLS - 1500) return "OCEANO";
    let v = Math.sin(x * 0.01);
    if (v > 0.6) return "AMAZONIA";
    if (v < -0.6) return "DESERTO";
    return "FLORESTA";
}

function initWorld() {
    for (let y = 0; y < WORLD_ROWS; y++) {
        world[y] = new Int8Array(WORLD_COLS);
        worldDamage[y] = new Int16Array(WORLD_COLS);
        treeWorld[y] = new Int8Array(WORLD_COLS);
    }

    for (let x = 0; x < WORLD_COLS; x++) {
        let biome = getBiome(x);
        let surfaceY;

        if (biome === "OCEANO") {
            surfaceY = 60 + Math.floor(Math.sin(x * 0.05) * 2);
            for(let y = surfaceY - 15; y < surfaceY; y++) world[y][x] = 7; // Água
        } else if (biome === "DESERTO") {
            surfaceY = Math.floor(40 + Math.sin(x * 0.05) * 2);
        } else if (biome === "AMAZONIA") {
            surfaceY = Math.floor(30 + Math.sin(x * 0.1) * 8);
        } else {
            surfaceY = Math.floor(35 + Math.sin(x * 0.1) * 5);
        }

        for (let y = 0; y < WORLD_ROWS; y++) {
            if (y < surfaceY) continue;
            let type = 3; // Pedra padrão
            if (y === surfaceY) type = (biome === "DESERTO" || biome === "OCEANO") ? 6 : 1;
            else if (y < surfaceY + 10) type = (biome === "DESERTO") ? 6 : 2;
            
            world[y][x] = type;
            worldDamage[y][x] = DURABILITY[type];
        }

        // Árvores (Apenas Floresta e Amazônia)
        if ((biome === "FLORESTA" || biome === "AMAZONIA") && x % 8 === 0 && Math.random() > 0.4) {
            let h = biome === "AMAZONIA" ? 8 + Math.random()*5 : 4 + Math.random()*3;
            for(let i=1; i<=h; i++) if(world[surfaceY-i]) treeWorld[surfaceY-i][x] = 4;
            // Folhas
            let ly = Math.floor(surfaceY - h);
            for(let fy=-3; fy<=0; fy++) {
                for(let fx=-2; fx<=2; fx++) {
                    if(treeWorld[ly+fy] && treeWorld[ly+fy][x+fx] === 0) treeWorld[ly+fy][x+fx] = 5;
                }
            }
        }
    }
}

// --- JOGADOR ---
const player = { x: 80000, y: 0, w: 20, h: 36, vx: 0, vy: 0, speed: 6, jump: -12, onGround: false };
let inventory = { 1: 50, 2: 50, 6: 50, 4: 50 };
let selectedSlot = 1;
const keys = {};
const camera = { x: 0, y: 0 };
let mousePos = { x: 0, y: 0 }, isMouseDown = false, isRightMouseDown = false;

function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE), gy = Math.floor(py / TILE_SIZE);
    if (gx < 0 || gx >= WORLD_COLS || gy < 0) return false;
    if (gy >= WORLD_ROWS) return true;
    return world[gy][gx] !== 0 && world[gy][gx] !== 7; // Água não é sólida
}

window.onkeydown = (e) => { keys[e.code] = true; if (e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateUI(); } };
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if (e.button === 0) isMouseDown = true; if (e.button === 2) isRightMouseDown = true; };
window.onmouseup = () => { isMouseDown = false; isRightMouseDown = false; };
canvas.onmousemove = (e) => { mousePos.x = e.clientX + camera.x; mousePos.y = e.clientY + camera.y; };
canvas.oncontextmenu = (e) => e.preventDefault();

function update() {
    gameTime = (gameTime + 1) % DAY_LENGTH;
    player.vx = keys['KeyA'] ? -player.speed : keys['KeyD'] ? player.speed : 0;
    player.x = Math.max(0, Math.min(player.x + player.vx, WORLD_WIDTH_PX - player.w));

    // Colisão X
    if (isSolid(player.x, player.y + 5) || isSolid(player.x + player.w, player.y + 5) ||
        isSolid(player.x, player.y + player.h - 5) || isSolid(player.x + player.w, player.y + player.h - 5)) {
        if (player.vx > 0) player.x = Math.floor((player.x + player.w) / TILE_SIZE) * TILE_SIZE - player.w - 0.1;
        else if (player.vx < 0) player.x = Math.floor(player.x / TILE_SIZE) * TILE_SIZE + TILE_SIZE + 0.1;
    }

    // Gravidade / Pulo
    player.vy += 0.6;
    player.y += player.vy;
    player.onGround = false;
    if (isSolid(player.x + 2, player.y + player.h) || isSolid(player.x + player.w - 2, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0; player.onGround = true;
    }
    if (player.onGround && (keys['Space'] || keys['KeyW'])) player.vy = player.jump;

    // Interação
    const gx = Math.floor(mousePos.x / TILE_SIZE), gy = Math.floor(mousePos.y / TILE_SIZE);
    if (Math.hypot(mousePos.x - (player.x + 10), mousePos.y - (player.y + 18)) <= REACH_DISTANCE && world[gy]) {
        if (isMouseDown && (world[gy][gx] !== 0 || treeWorld[gy][gx] !== 0)) {
            if (world[gy][gx] !== 0 && world[gy][gx] !== 7) {
                worldDamage[gy][gx]--;
                if(worldDamage[gy][gx] <= 0) { inventory[world[gy][gx]] = (inventory[world[gy][gx]] || 0) + 1; world[gy][gx] = 0; updateUI(); }
            } else if (treeWorld[gy][gx] !== 0) {
                inventory[treeWorld[gy][gx]] = (inventory[treeWorld[gy][gx]] || 0) + 1; treeWorld[gy][gx] = 0; updateUI();
            }
        }
        if (isRightMouseDown && world[gy][gx] === 0 && inventory[selectedSlot] > 0) {
            world[gy][gx] = selectedSlot; worldDamage[gy][gx] = DURABILITY[selectedSlot]; inventory[selectedSlot]--; updateUI();
        }
    }

    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;
    camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH_PX - canvas.width));

    document.getElementById('debug-info').innerText = `X: ${Math.floor(player.x)} | Bioma: ${getBiome(Math.floor(player.x/TILE_SIZE))}`;
    draw();
    requestAnimationFrame(update);
}

function draw() {
    let dayRatio = Math.sin((gameTime / DAY_LENGTH) * Math.PI * 2); 
    ctx.fillStyle = `rgb(0, ${Math.max(10, 60 + dayRatio * 100)}, ${Math.max(20, 100 + dayRatio * 155)})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sC = Math.floor(camera.x / TILE_SIZE) - 1, eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 2;
    for (let y = 0; y < WORLD_ROWS; y++) {
        for (let x = sC; x < eC; x++) {
            if (x < 0 || x >= WORLD_COLS) continue;
            if (treeWorld[y][x] !== 0) ctx.drawImage(tex[treeWorld[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            if (world[y][x] !== 0) ctx.drawImage(tex[world[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    }

    ctx.fillStyle = "#ff5722";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.restore();

    let nightOpacity = Math.max(0, -dayRatio * 0.65);
    ctx.fillStyle = `rgba(0, 0, 30, ${nightOpacity})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function updateUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.querySelector('.count').innerText = inventory[i] || 0;
        slot.classList.toggle('selected', selectedSlot === i);
        if (!slot.querySelector('canvas') && tex[i]) {
            const icon = document.createElement('canvas'); icon.width = 16; icon.height = 16;
            icon.getContext('2d').drawImage(tex[i], 0, 0); slot.appendChild(icon);
        }
    }
}

initTextures();
initWorld();
updateUI();
update();
</script>
