<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Inventário e Construção</title>
    <style>
        body { margin: 0; overflow: hidden; background: #4da0ff; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }

        #inventory-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.6); padding: 10px;
            border-radius: 12px; border: 2px solid #444; z-index: 100;
        }

        .slot {
            width: 50px; height: 50px; background: #333;
            border: 2px solid #666; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: 0.2s;
        }

        /* Destaque para o item selecionado */
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; background: #444; }

        .slot img { width: 32px; height: 32px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="info">
    <b>BOTÃO ESQUERDO:</b> Minerar | <b>BOTÃO DIREITO:</b> Construir<br>
    <b>TECLAS 1-5:</b> Selecionar Item | <b>W, A, D:</b> Mover
</div>

<div id="inventory-ui">
    <div class="slot selected" id="slot-1"><div class="count">0</div></div>
    <div class="slot" id="slot-2"><div class="count">0</div></div>
    <div class="slot" id="slot-3"><div class="count">0</div></div>
    <div class="slot" id="slot-4"><div class="count">0</div></div>
    <div class="slot" id="slot-5"><div class="count">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE_SIZE = 40;
const REACH_DISTANCE = TILE_SIZE * 5;
const DURABILITY = { 1: 5, 2: 5, 3: 15, 4: 10, 5: 5 }; 

// --- Sistema de Inventário ---
let inventory = { 1: 10, 2: 10, 3: 0, 4: 0, 5: 0 }; // Começa com alguns blocos para teste
let selectedSlot = 1;

function updateInventoryUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        const countText = slot.querySelector('.count');
        countText.innerText = inventory[i];
        
        slot.classList.toggle('selected', selectedSlot === i);

        if (inventory[i] > 0 && !slot.querySelector('img')) {
            const imgClone = getImgByType(i).cloneNode();
            slot.appendChild(imgClone);
        } else if (inventory[i] <= 0) {
            const img = slot.querySelector('img');
            if (img) img.remove();
        }
    }
}

function getImgByType(type) {
    if (type === 1) return imgGrama;
    if (type === 2) return imgTerra;
    if (type === 3) return imgPedra;
    if (type === 4) return imgTronco;
    return imgFolha;
}

// --- Assets ---
let assetsLoaded = 0;
const onAssetLoad = () => { if (++assetsLoaded === 5) { updateInventoryUI(); update(); } };

const imgGrama = new Image(); imgGrama.onload = onAssetLoad; imgGrama.src = "https://st2.depositphotos.com/1796420/8408/v/450/depositphotos_84083416-stock-illustration-texture-for-platformers-pixel-art.jpg";
const imgTerra = new Image(); imgTerra.onload = onAssetLoad; imgTerra.src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRtCbeyZC6PjgiaDttQFYo4r4TUHIJFCdumA&s";
const imgPedra = new Image(); imgPedra.onload = onAssetLoad; imgPedra.src = "https://i.pinimg.com/236x/d3/5c/0c/d35c0c58fff90987e9532e808ded0008.jpg";
const imgTronco = new Image(); imgTronco.onload = onAssetLoad; imgTronco.src = "https://i.pinimg.com/736x/10/61/7b/10617b804bd2581499fcbea1426439f1.jpg";
const imgFolha = new Image(); imgFolha.onload = onAssetLoad; imgFolha.src = "https://i.pinimg.com/1200x/09/c5/2d/09c52d89d8086495ab609332e6d55e85.jpg";

// --- Mundo ---
const WORLD_COLS = 200, WORLD_ROWS = 60;
const WORLD_WIDTH = WORLD_COLS * TILE_SIZE, WORLD_HEIGHT = WORLD_ROWS * TILE_SIZE;
let world = [], worldDamage = [], treeWorld = [];

for (let y = 0; y < WORLD_ROWS; y++) {
    world[y] = []; worldDamage[y] = []; treeWorld[y] = [];
    for (let x = 0; x < WORLD_COLS; x++) {
        treeWorld[y][x] = 0;
        let type = (y === 15) ? 1 : (y > 15 && y < 30) ? 2 : (y >= 30) ? 3 : 0;
        world[y][x] = type;
        worldDamage[y][x] = type !== 0 ? DURABILITY[type] : 0;
    }
}

// --- Jogador e Inputs ---
const player = { x: WORLD_WIDTH / 2, y: 400, w: 22, h: 38, vx: 0, vy: 0, speed: 5, jump: -11, onGround: false };
const keys = {};
const camera = { x: 0, y: 0 };
let isMouseDown = false, isRightMouseDown = false, mousePos = { x: 0, y: 0 };

window.onkeydown = (e) => {
    keys[e.code] = true;
    if (e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateInventoryUI(); }
};
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { if (e.button === 0) isMouseDown = true; if (e.button === 2) isRightMouseDown = true; };
window.onmouseup = (e) => { if (e.button === 0) isMouseDown = false; if (e.button === 2) isRightMouseDown = false; };
canvas.onmousemove = (e) => { mousePos.x = e.clientX + camera.x; mousePos.y = e.clientY + camera.y; };
canvas.oncontextmenu = (e) => e.preventDefault(); // Desativa menu do botão direito

function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE), gy = Math.floor(py / TILE_SIZE);
    return world[gy] && world[gy][gx] !== 0;
}

function update() {
    // Movimento
    player.vx = keys['KeyA'] ? -player.speed : keys['KeyD'] ? player.speed : 0;
    player.x += player.vx;
    if (isSolid(player.x, player.y + 2) || isSolid(player.x, player.y + player.h - 2)) player.x = (Math.floor(player.x / TILE_SIZE) + 1) * TILE_SIZE;
    if (isSolid(player.x + player.w, player.y + 2) || isSolid(player.x + player.w, player.y + player.h - 2)) player.x = (Math.floor((player.x + player.w) / TILE_SIZE)) * TILE_SIZE - player.w;

    player.vy += 0.55; player.y += player.vy; player.onGround = false;
    if (isSolid(player.x + 2, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0; player.onGround = true;
    }

    const gx = Math.floor(mousePos.x / TILE_SIZE);
    const gy = Math.floor(mousePos.y / TILE_SIZE);
    const dist = Math.sqrt(Math.pow(mousePos.x - (player.x + player.w/2), 2) + Math.pow(mousePos.y - (player.y + player.h/2), 2));

    if (dist <= REACH_DISTANCE) {
        // MINERAR (Botão Esquerdo)
        if (isMouseDown) {
            if (world[gy] && world[gy][gx] !== 0) {
                worldDamage[gy][gx]--;
                if (worldDamage[gy][gx] <= 0) { inventory[world[gy][gx]]++; world[gy][gx] = 0; updateInventoryUI(); }
            } else if (treeWorld[gy] && treeWorld[gy][gx] !== 0) {
                worldDamage[gy][gx]--;
                if (worldDamage[gy][gx] <= 0) { inventory[treeWorld[gy][gx]]++; treeWorld[gy][gx] = 0; updateInventoryUI(); }
            }
        }
        // CONSTRUIR (Botão Direito)
        if (isRightMouseDown && inventory[selectedSlot] > 0) {
            if (world[gy] && world[gy][gx] === 0 && treeWorld[gy][gx] === 0) {
                // Checa se o bloco não vai prender o jogador
                const blockRect = { x: gx * TILE_SIZE, y: gy * TILE_SIZE, w: TILE_SIZE, h: TILE_SIZE };
                const playerRect = { x: player.x, y: player.y, w: player.w, h: player.h };
                
                if (!(playerRect.x < blockRect.x + blockRect.w && playerRect.x + playerRect.w > blockRect.x &&
                      playerRect.y < blockRect.y + blockRect.h && playerRect.y + playerRect.h > blockRect.y)) {
                    world[gy][gx] = selectedSlot;
                    worldDamage[gy][gx] = DURABILITY[selectedSlot];
                    inventory[selectedSlot]--;
                    updateInventoryUI();
                }
            }
        }
    }

    camera.x = Math.max(0, Math.min(player.x - canvas.width / 2, WORLD_WIDTH - canvas.width));
    camera.y = Math.max(0, Math.min(player.y - canvas.height / 2, WORLD_HEIGHT - canvas.height));
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sC = Math.floor(camera.x / TILE_SIZE), eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 1;
    const sR = Math.floor(camera.y / TILE_SIZE), eR = sR + Math.ceil(canvas.height / TILE_SIZE) + 1;

    for (let y = sR; y < eR; y++) {
        for (let x = sC; x < eC; x++) {
            if (y >= 15) {
                ctx.fillStyle = (y < 30) ? "#2c1e14" : "#1a1a1a"; 
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
            if (treeWorld[y] && treeWorld[y][x] !== 0) {
                ctx.globalAlpha = 0.8;
                ctx.drawImage(treeWorld[y][x] === 4 ? imgTronco : imgFolha, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                ctx.globalAlpha = 1;
            }
            if (world[y] && world[y][x] !== 0) {
                let img = world[y][x] === 1 ? imgGrama : (world[y][x] === 2 ? imgTerra : imgPedra);
                ctx.drawImage(img, x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                if (worldDamage[y][x] < DURABILITY[world[y][x]]) {
                    ctx.strokeStyle = "red"; ctx.strokeRect(x * TILE_SIZE + 5, y * TILE_SIZE + 5, TILE_SIZE - 10, TILE_SIZE - 10);
                }
            }
        }
    }

    ctx.fillStyle = '#FF6347'; ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.restore();
}
</script>
</body>
</html>
