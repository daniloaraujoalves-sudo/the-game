<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Mundo Colossal com Mini Mapa</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        
        .info { 
            position: absolute; top: 10px; left: 10px; 
            color: white; text-shadow: 1px 1px 2px black; 
            background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }

        /* ESTILO DO MINI MAPA */
        #minimap-container {
            position: absolute; top: 10px; right: 10px;
            width: 200px; height: 120px;
            border: 2px solid #555; background: rgba(0, 0, 0, 0.8);
            border-radius: 4px; overflow: hidden; z-index: 100;
        }
        #minimapCanvas {
            width: 100%; height: 100%;
            image-rendering: pixelated; /* Mantém o visual de pixels */
        }

        #inventory-ui {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 8px;
            background: rgba(0, 0, 0, 0.7); padding: 10px;
            border-radius: 12px; border: 2px solid #444; z-index: 100;
        }
        .slot {
            width: 45px; height: 45px; background: #333;
            border: 2px solid #666; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; background: #555; }
        .slot canvas { width: 30px; height: 30px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 2px; right: 4px; color: white; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="info" id="debug-info">Carregando...</div>

<div id="minimap-container">
    <canvas id="minimapCanvas"></canvas>
</div>

<div id="inventory-ui">
    <div class="slot selected" id="slot-1"><div class="count">0</div></div>
    <div class="slot" id="slot-2"><div class="count">0</div></div>
    <div class="slot" id="slot-3"><div class="count">0</div></div>
    <div class="slot" id="slot-4"><div class="count">0</div></div>
    <div class="slot" id="slot-5"><div class="count">0</div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const miniCanvas = document.getElementById('minimapCanvas');
const mCtx = miniCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIGURAÇÃO ---
const TILE_SIZE = 40;
const WORLD_WIDTH_PX = 600000;
const WORLD_COLS = Math.floor(WORLD_WIDTH_PX / TILE_SIZE);
const WORLD_ROWS = 90;
const REACH_DISTANCE = TILE_SIZE * 5;

// Cores para o Mini Mapa
const BLOCK_COLORS = { 
    1: "#4caf50", 2: "#795548", 3: "#9e9e9e", 
    4: "#5d4037", 5: "#2e7d32", 6: "#f4d03f", 7: "#3498db" 
};
const DURABILITY = { 1: 15, 2: 15, 3: 40, 4: 25, 5: 10, 6: 12, 7: 999 };

let world = [], worldDamage = [], treeWorld = [];
const player = { 
    x: 2000, y: 0, // Começa perto do início para evitar tela preta
    w: 20, h: 36, vx: 0, vy: 0, speed: 6, jump: -12, onGround: false 
};

let inventory = { 1: 50, 2: 50, 6: 50, 4: 50 };
let selectedSlot = 1;
const keys = {};
const camera = { x: 0, y: 0 };
let mousePos = { x: 0, y: 0 }, isMouseDown = false, isRightMouseDown = false;

// --- TEXTURAS ---
const tex = {};
function initTextures() {
    for (let id in BLOCK_COLORS) {
        const tCanvas = document.createElement('canvas');
        tCanvas.width = 16; tCanvas.height = 16;
        const tCtx = tCanvas.getContext('2d');
        tCtx.fillStyle = BLOCK_COLORS[id];
        tCtx.fillRect(0, 0, 16, 16);
        tCtx.strokeStyle = "rgba(0,0,0,0.1)";
        tCtx.strokeRect(0,0,16,16);
        tex[id] = tCanvas;
    }
}

// --- MUNDO E MINI MAPA ---
function getBiome(x) {
    if (x < 1000 || x > WORLD_COLS - 1000) return "OCEANO";
    let v = Math.sin(x * 0.01);
    if (v > 0.6) return "AMAZONIA";
    if (v < -0.6) return "DESERTO";
    return "FLORESTA";
}

function initWorld() {
    // Configura o tamanho do canvas do mini mapa baseado nas colunas do mundo
    miniCanvas.width = WORLD_COLS;
    miniCanvas.height = WORLD_ROWS;

    for (let y = 0; y < WORLD_ROWS; y++) {
        world[y] = new Int8Array(WORLD_COLS);
        worldDamage[y] = new Int16Array(WORLD_COLS);
        treeWorld[y] = new Int8Array(WORLD_COLS);
    }

    for (let x = 0; x < WORLD_COLS; x++) {
        let biome = getBiome(x);
        let surfaceY = Math.floor(45 + Math.sin(x * 0.1) * 5);
        
        for (let y = 0; y < WORLD_ROWS; y++) {
            if (y < surfaceY) {
                if(biome === "OCEANO" && y > 50) world[y][x] = 7;
                continue;
            }
            let type = (y === surfaceY) ? (biome === "DESERTO" ? 6 : 1) : (y < surfaceY + 10 ? 2 : 3);
            world[y][x] = type;
            worldDamage[y][x] = DURABILITY[type];
        }
    }
    drawMinimapBase();
}

// Desenha o mapa estático uma vez
function drawMinimapBase() {
    mCtx.clearRect(0,0, miniCanvas.width, miniCanvas.height);
    for(let x=0; x < WORLD_COLS; x++) {
        for(let y=0; y < WORLD_ROWS; y++) {
            if(world[y][x] !== 0) {
                mCtx.fillStyle = BLOCK_COLORS[world[y][x]];
                mCtx.fillRect(x, y, 1, 1);
            }
        }
    }
}

function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE), gy = Math.floor(py / TILE_SIZE);
    if (gx < 0 || gx >= WORLD_COLS || gy < 0) return false;
    if (gy >= WORLD_ROWS) return true;
    return world[gy][gx] !== 0 && world[gy][gx] !== 7;
}

// --- LOOP ---
function update() {
    // Movimento
    player.vx = keys['KeyA'] ? -player.speed : keys['KeyD'] ? player.speed : 0;
    player.x += player.vx;
    if (isSolid(player.x, player.y + 5) || isSolid(player.x + player.w, player.y + 5)) player.x -= player.vx;

    player.vy += 0.6;
    player.y += player.vy;
    if (isSolid(player.x + 2, player.y + player.h)) {
        player.y = Math.floor((player.y + player.h) / TILE_SIZE) * TILE_SIZE - player.h;
        player.vy = 0; player.onGround = true;
    } else { player.onGround = false; }

    if (player.onGround && (keys['Space'] || keys['KeyW'])) player.vy = player.jump;

    // Câmera
    camera.x += (player.x - canvas.width / 2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height / 2 - camera.y) * 0.1;

    // Lógica do Mini Mapa Dinâmico (faz o mapa "correr")
    let playerGX = Math.floor(player.x / TILE_SIZE);
    // Move o elemento canvas para centralizar o player no mini container
    miniCanvas.style.transform = `translateX(${(100 - playerGX)}px)`;

    document.getElementById('debug-info').innerText = `Bioma: ${getBiome(playerGX)} | X: ${Math.floor(player.x)}`;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#87CEEB"; // Céu
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sC = Math.floor(camera.x / TILE_SIZE) - 1, eC = sC + Math.ceil(canvas.width / TILE_SIZE) + 2;
    const sR = Math.floor(camera.y / TILE_SIZE) - 1, eR = sR + Math.ceil(canvas.height / TILE_SIZE) + 2;

    for (let y = sR; y < eR; y++) {
        if(y < 0 || y >= WORLD_ROWS) continue;
        for (let x = sC; x < eC; x++) {
            if (x >= 0 && x < WORLD_COLS && world[y][x] !== 0) {
                ctx.drawImage(tex[world[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    ctx.fillStyle = "#ff5722"; // Player
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.restore();
}

// Eventos
window.onkeydown = (e) => { 
    keys[e.code] = true; 
    if (e.key >= '1' && e.key <= '5') { selectedSlot = parseInt(e.key); updateUI(); }
};
window.onkeyup = (e) => keys[e.code] = false;

function updateUI() {
    for (let i = 1; i <= 5; i++) {
        const slot = document.getElementById(`slot-${i}`);
        slot.querySelector('.count').innerText = inventory[i] || 0;
        slot.classList.toggle('selected', selectedSlot === i);
        if (!slot.querySelector('canvas') && tex[i]) {
            const icon = document.createElement('canvas'); icon.width = 16; icon.height = 16;
            icon.getContext('2d').drawImage(tex[i], 0, 0); slot.appendChild(icon);
        }
    }
}

initTextures();
initWorld();
updateUI();
update();
</script>
</body>
</html>
