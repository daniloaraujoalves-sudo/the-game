<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mini Terraria - Ultimate Survival Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; cursor: crosshair; }
        
        /* UI Estilizada */
        .ui-container { position: absolute; top: 10px; left: 10px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .info { color: white; text-shadow: 1px 1px 2px black; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 5px; font-size: 13px; border: 1px solid #444; pointer-events: none; }
        
        #hp-bar { width: 200px; height: 18px; background: #333; border: 2px solid #fff; border-radius: 3px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #ff4757; transition: width 0.2s; }
        
        #inventory-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; background: rgba(0, 0, 0, 0.85); padding: 10px; border-radius: 10px; border: 2px solid #444; z-index: 100; }
        .slot { width: 45px; height: 45px; background: #222; border: 2px solid #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .slot.selected { border-color: #fff; background: #444; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .slot canvas { width: 28px; height: 28px; image-rendering: pixelated; }
        .count { position: absolute; bottom: 1px; right: 3px; color: white; font-size: 11px; font-weight: bold; }
        
        #minimap-container { position: absolute; top: 10px; right: 10px; width: 180px; height: 130px; border: 2px solid #666; background: #000; border-radius: 5px; overflow: hidden; z-index: 100; }
        #minimap { width: 100%; height: 100%; image-rendering: pixelated; }
    </style>
</head>
<body>

<div class="ui-container">
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div class="info" id="location-info">Carregando Mundo...</div>
    <div class="info" id="debug-info">X: 0 Y: 0</div>
</div>

<div id="minimap-container"><canvas id="minimap"></canvas></div>
<div id="inventory-ui"></div>

<canvas id="gameCanvas"></canvas>

<script>
/** ENGINE CONFIG **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
minimapCanvas.width = 180;
minimapCanvas.height = 130;

const TILE_SIZE = 40;
const WORLD_WIDTH_PX = 600000;
const WORLD_COLS = Math.floor(WORLD_WIDTH_PX / TILE_SIZE);
const WORLD_ROWS = 100;
const DAY_LENGTH = 20000;
const REACH_DISTANCE = TILE_SIZE * 5;

const DURABILITY = { 1: 15, 2: 15, 3: 40, 4: 25, 5: 10, 6: 12, 7: 999, 8: 60, 9: 45 };

let world = [], worldDamage = [], treeWorld = [];
let particles = [], entities = [], drops = [];
let gameTime = 5000;
const tex = {};

/** ASSETS & TEXTURES **/
function initTextures() {
    const palette = {
        1: ["#4caf50", "#2e7d32", "grass"], 2: ["#795548", "#5d4037", "block"],
        3: ["#9e9e9e", "#616161", "block"], 4: ["#5d4037", "#3e2723", "block"],
        5: ["#2e7d32", "#1b5e20", "leaves"], 6: ["#f4d03f", "#d4ac0d", "block"],
        7: ["#3498db", "#2980b9", "water"], 8: ["#dcdde1", "#718093", "block"],
        9: ["#2f3640", "#000000", "block"]
    };
    for (let id in palette) {
        const tCanvas = document.createElement('canvas');
        tCanvas.width = 16; tCanvas.height = 16;
        const tCtx = tCanvas.getContext('2d');
        tCtx.fillStyle = palette[id][0];
        tCtx.fillRect(0, 0, 16, 16);
        tCtx.fillStyle = palette[id][1];
        if(palette[id][2] === "grass") tCtx.fillRect(0, 0, 16, 5);
        if(palette[id][2] === "block") { tCtx.globalAlpha = 0.3; tCtx.fillRect(0, 12, 16, 4); tCtx.fillRect(12, 0, 4, 16); }
        tex[id] = tCanvas;
    }
}

/** WORLD GEN (COLOSSAL BIOMES) **/
function getBiome(x) {
    if (x < 1500 || x > WORLD_COLS - 1500) return "OCEANO";
    const v = Math.sin(x * 0.01);
    if (v > 0.65) return "AMAZONIA";
    if (v < -0.65) return "DESERTO";
    return "FLORESTA";
}

function initWorld() {
    for (let y = 0; y < WORLD_ROWS; y++) {
        world[y] = new Int8Array(WORLD_COLS);
        worldDamage[y] = new Int16Array(WORLD_COLS);
        treeWorld[y] = new Int8Array(WORLD_COLS);
    }

    for (let x = 0; x < WORLD_COLS; x++) {
        const biome = getBiome(x);
        let surfY;
        if (biome === "OCEANO") surfY = 65 + Math.floor(Math.sin(x * 0.04) * 4);
        else if (biome === "DESERTO") surfY = 42 + Math.floor(Math.sin(x * 0.06) * 3);
        else if (biome === "AMAZONIA") surfY = 30 + Math.floor(Math.sin(x * 0.09) * 10);
        else surfY = 45 + Math.floor(Math.sin(x * 0.05) * 5);

        for (let y = 0; y < WORLD_ROWS; y++) {
            if (y < surfY) continue;
            let type = 3; 
            if (y === surfY) type = (biome === "OCEANO") ? 7 : (biome === "DESERTO" ? 6 : 1);
            else if (y < surfY + 8) type = (biome === "DESERTO") ? 6 : 2;
            else if (Math.random() < 0.01) type = (y > 70) ? 9 : 8;
            
            world[y][x] = type;
            worldDamage[y][x] = DURABILITY[type] || 20;
        }
        if (x % 15 === 0 && biome !== "OCEANO" && Math.random() < 0.6) spawnTree(x, surfY);
    }
}

function spawnTree(x, y) {
    const biome = getBiome(x);
    const h = (biome === "AMAZONIA" ? 10 : 5) + Math.floor(Math.random() * 4);
    for(let i=1; i<=h; i++) if(y-i > 0) treeWorld[y-i][x] = 4;
    for(let ly=-3; ly<=0; ly++) for(let lx=-2; lx<=2; lx++) 
        if(y-h+ly > 0 && Math.abs(lx)+Math.abs(ly+1) < 4) treeWorld[y-h+ly][x+lx] = 5;
}

/** PLAYER & ENTITIES **/
const player = { 
    x: 80000, y: 0, w: 20, h: 36, vx: 0, vy: 0, hp: 100, 
    inventory: {1:50, 2:50, 4:20, 6:0, 8:0}, selected: 1 
};
const keys = {};
const camera = { x: 0, y: 0 };
let mouse = { x: 0, y: 0, down: false, rightDown: false };

function spawnSlime(x, y) {
    entities.push({ x, y, w: 24, h: 18, vx: 0, vy: 0, hp: 30, type: 'slime', color: '#44ff44' });
}

function spawnDrop(x, y, id) {
    if(id === 0 || id === 7) return;
    drops.push({ x, y, vx: (Math.random()-0.5)*4, vy: -4, id });
}

/** PHYSICS **/
function isSolid(px, py) {
    const gx = Math.floor(px / TILE_SIZE), gy = Math.floor(py / TILE_SIZE);
    if (gx < 0 || gx >= WORLD_COLS || gy < 0) return false;
    if (gy >= WORLD_ROWS) return true;
    return world[gy][gx] !== 0 && world[gy][gx] !== 7;
}

/** INPUTS **/
window.onkeydown = (e) => { 
    keys[e.code] = true;
    if (["1","2","3","4","6"].includes(e.key)) { player.selected = parseInt(e.key); updateUI(); }
};
window.onkeyup = (e) => keys[e.code] = false;
canvas.onmousedown = (e) => { 
    if(e.button === 0) mouse.down = true; 
    if(e.button === 2) mouse.rightDown = true; 
};
window.onmouseup = () => { mouse.down = false; mouse.rightDown = false; };
canvas.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
canvas.oncontextmenu = (e) => e.preventDefault();

/** MINIMAP **/
function updateMinimap() {
    minimapCtx.fillStyle = "#000";
    minimapCtx.fillRect(0, 0, minimapCanvas.width, minimapCanvas.height);
    const pX = Math.floor(player.x / TILE_SIZE), pY = Math.floor(player.y / TILE_SIZE);
    const scale = 3;
    const startX = pX - Math.floor(minimapCanvas.width / (2 * scale));
    const startY = pY - Math.floor(minimapCanvas.height / (2 * scale));

    for (let my = 0; my < minimapCanvas.height; my += scale) {
        for (let mx = 0; mx < minimapCanvas.width; mx += scale) {
            const wx = startX + Math.floor(mx / scale);
            const wy = startY + Math.floor(my / scale);
            if (wx >= 0 && wx < WORLD_COLS && wy >= 0 && wy < WORLD_ROWS) {
                const tile = world[wy][wx];
                if (tile === 1) minimapCtx.fillStyle = "#4caf50";
                else if (tile === 7) minimapCtx.fillStyle = "#3498db";
                else if (tile !== 0) minimapCtx.fillStyle = "#555";
                else if (treeWorld[wy][wx] !== 0) minimapCtx.fillStyle = "#2e7d32";
                else continue;
                minimapCtx.fillRect(mx, my, scale, scale);
            }
        }
    }
    minimapCtx.fillStyle = "#ff0000";
    minimapCtx.fillRect(minimapCanvas.width/2 - 2, minimapCanvas.height/2 - 2, 4, 4);
}

/** UPDATE LOOP **/
function update() {
    gameTime = (gameTime + 1) % DAY_LENGTH;
    
    // Player Physics
    player.vx = keys['KeyA'] ? -5 : keys['KeyD'] ? 5 : 0;
    player.vy += 0.5;
    
    player.x += player.vx;
    if(isSolid(player.x, player.y+5) || isSolid(player.x+player.w, player.y+5)) player.x -= player.vx;
    
    player.y += player.vy;
    if(isSolid(player.x+2, player.y+player.h) || isSolid(player.x+player.w-2, player.y+player.h)) {
        if(player.vy > 16) player.hp -= (player.vy-12)*3;
        player.y = Math.floor((player.y+player.h)/TILE_SIZE)*TILE_SIZE - player.h;
        player.vy = 0;
        if(keys['Space'] || keys['KeyW']) player.vy = -10;
    }

    // Entities (Slimes)
    entities.forEach((en, i) => {
        en.vy += 0.5; en.x += en.vx; en.y += en.vy;
        if(isSolid(en.x, en.y+en.h)) { en.y = Math.floor((en.y+en.h)/40)*40-en.h; en.vy = -4; }
        en.vx = (player.x > en.x) ? 1.5 : -1.5;
        if(Math.abs(player.x - en.x) < 20 && Math.abs(player.y - en.y) < 20) player.hp -= 0.5;
        if(en.hp <= 0) { entities.splice(i, 1); spawnDrop(en.x, en.y, 9); }
    });

    // Interaction (Mine & Build)
    const gx = Math.floor((mouse.x + camera.x)/TILE_SIZE);
    const gy = Math.floor((mouse.y + camera.y)/TILE_SIZE);
    const dist = Math.hypot((mouse.x+camera.x) - (player.x+10), (mouse.y+camera.y) - (player.y+18));

    if(dist < REACH_DISTANCE) {
        if(mouse.down) {
            // Hit Enemies
            entities.forEach(en => {
                if(Math.hypot(en.x - (mouse.x+camera.x), en.y - (mouse.y+camera.y)) < 30) en.hp -= 2;
            });
            // Mine
            if(world[gy] && world[gy][gx] > 0 && world[gy][gx] !== 7) {
                worldDamage[gy][gx]--;
                if(worldDamage[gy][gx] <= 0) {
                    spawnDrop(gx*TILE_SIZE, gy*TILE_SIZE, world[gy][gx]);
                    world[gy][gx] = 0;
                    updateUI();
                }
            } else if (treeWorld[gy] && treeWorld[gy][gx] > 0) {
                spawnDrop(gx*TILE_SIZE, gy*TILE_SIZE, treeWorld[gy][gx]);
                treeWorld[gy][gx] = 0;
                updateUI();
            }
        }
        if(mouse.rightDown && world[gy] && world[gy][gx] === 0 && treeWorld[gy][gx] === 0) {
            if(player.inventory[player.selected] > 0) {
                world[gy][gx] = player.selected;
                worldDamage[gy][gx] = DURABILITY[player.selected] || 20;
                player.inventory[player.selected]--;
                updateUI();
            }
        }
    }

    // Drops
    drops.forEach((d, i) => {
        d.vy += 0.3; d.x += d.vx; d.y += d.vy;
        if(isSolid(d.x, d.y+10)) { d.vy = 0; d.vx *= 0.8; d.y = Math.floor((d.y+10)/40)*40-10; }
        if(Math.hypot(player.x-d.x, player.y-d.y) < 40) {
            player.inventory[d.id] = (player.inventory[d.id] || 0) + 1;
            drops.splice(i, 1); updateUI();
        }
    });

    // Camera & Spawner
    camera.x += (player.x - canvas.width/2 - camera.x) * 0.1;
    camera.y += (player.y - canvas.height/2 - camera.y) * 0.1;
    if(Math.random() < 0.005 && entities.length < 8) spawnSlime(player.x + (Math.random()-0.5)*1200, player.y - 400);

    if(player.hp <= 0) { alert("Game Over!"); location.reload(); }
    
    updateMinimap();
    draw();
    requestAnimationFrame(update);
}

function draw() {
    // Sky with Day/Night Cycle
    const dayRatio = Math.sin((gameTime/DAY_LENGTH)*Math.PI*2);
    ctx.fillStyle = `rgb(0, ${70+dayRatio*100}, ${120+dayRatio*130})`;
    ctx.fillRect(0,0,canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const sc = Math.floor(camera.x/TILE_SIZE)-1, ec = sc + Math.ceil(canvas.width/TILE_SIZE)+2;
    for(let y=0; y<WORLD_ROWS; y++) {
        for(let x=sc; x<ec; x++) {
            if(x<0 || x>=WORLD_COLS) continue;
            if(treeWorld[y][x]) ctx.drawImage(tex[treeWorld[y][x]], x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
            if(world[y][x]) ctx.drawImage(tex[world[y][x]], x*TILE_SIZE, y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    }

    entities.forEach(en => { ctx.fillStyle = en.color; ctx.fillRect(en.x, en.y, en.w, en.h); });
    drops.forEach(dr => { if(tex[dr.id]) ctx.drawImage(tex[dr.id], dr.x, dr.y, 18, 18); });

    ctx.fillStyle = "#ff5722";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.restore();

    // Night overlay
    let nightOpacity = Math.max(0, -dayRatio * 0.5);
    ctx.fillStyle = `rgba(0, 0, 20, ${nightOpacity})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // UI Updates
    document.getElementById('hp-fill').style.width = player.hp + "%";
    document.getElementById('location-info').innerText = `${getBiome(Math.floor(player.x/TILE_SIZE))} | ${player.y > 2500 ? 'Cavernas' : 'Superfície'}`;
    document.getElementById('debug-info').innerText = `X: ${Math.floor(player.x)} Y: ${Math.floor(player.y)}`;
}

function updateUI() {
    const ui = document.getElementById('inventory-ui');
    ui.innerHTML = '';
    [1, 2, 3, 4, 6, 8, 9].forEach(id => {
        const div = document.createElement('div');
        div.className = `slot ${player.selected === id ? 'selected' : ''}`;
        div.onclick = () => { player.selected = id; updateUI(); };
        const count = player.inventory[id] || 0;
        div.innerHTML = `<div class="count">${count}</div>`;
        if(tex[id]) {
            const icon = document.createElement('canvas'); icon.width=16; icon.height=16;
            icon.getContext('2d').drawImage(tex[id],0,0); div.appendChild(icon);
        }
        ui.appendChild(div);
    });
}

/** START **/
initTextures();
initWorld();
updateUI();
update();
</script>
</body>
</html>
